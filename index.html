        * {

        .font-serif {

        #reader {
            border: none !important;
            border-radius: 2rem;
            overflow: hidden;
            background: #0f172a;
        }

        #reader__dashboard_section_csr button {
            background: #3b82f6 !important;
            color: white;
            padding: 12px 24px !important;
            border-radius: 40px !important;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
        }

        .glass {
            background: rgba(240, 249, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .dark .glass {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .sepia .glass {
            background: rgba(251, 240, 227, 0.8);
            border-color: rgba(129, 72, 14, 0.1);
        }

        .book-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .density-relaxed {
            padding: 2rem !important;
        }

        .density-compact {
            padding: 0.75rem !important;
        }

        .book-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -10px rgba(59, 130, 246, 0.2);
        }

        .animate-slide-up {
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Light blueish theme scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #bae6fd;
            border-radius: 10px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #1e293b;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            z-index: 100;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            max-height: 250px;
            overflow-y: auto;
            display: none;
            margin-top: 0.5rem;
        }

        .dark .dropdown-menu {
            background: #1e293b;
            border-color: #334155;
        }

        .dropdown-item {
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .dropdown-item:hover {
            background: #f1f5f9;
            color: #3b82f6;
        }

        .dark .dropdown-item:hover {
            background: #334155;
            color: #60a5fa;
        }

        :root {
            --primary-color: #3b82f6;
        }

        /* Utility class to prevent text selection on interactive elements like buttons or book cards */
        .unselectable {
            -webkit-user-select: none;
            /* Safari */
            -moz-user-select: none;
            /* Firefox */
            -ms-user-select: none;
            /* Internet Explorer/Edge */
            user-select: none;
            /* Standard syntax */
        }

    <script>
        // Initialize theme immediately to prevent flash
        const savedTheme = localStorage.getItem('mylib_theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else if (savedTheme === 'sepia') {
            document.documentElement.classList.add('sepia');
        } else {
            document.documentElement.classList.remove('dark', 'sepia');
        }

        (function () {
            // ---------- State ----------
            let deferredPrompt = null;
            let currentUser = null;
            window.__setCurrentUser = (u) => currentUser = u;
            let userProfile = null;
            window.__setUserProfile = (p) => userProfile = p;

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                if (activeTab === 'settings') renderMainApp();
            });

            window.addEventListener('appinstalled', () => {
                deferredPrompt = null;
                if (activeTab === 'settings') renderMainApp();
            });
            let books = [];                // local copy for UI, synced with Firestore
            let readingStatuses = {};      // local copy for per-user statuses {bookId: status}
            let unsubscribeBooks = null;
            let unsubscribeStatus = null;
            let activeTab = 'library';     // 'library', 'wishlist', 'activity', 'settings'
            let chatHistory = [];
            let aiResponseCache = [];      // Cache last 5 responses [{prompt, response}]
            let lastActiveTab = null;
            let myBooksSubTab = 'finished';
            let currentModalCloseHandler = null;
            let aiSearchResults = null; // List of book IDs

            // Global keyboard shortcuts (attached once)
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && currentModalCloseHandler) {
                    currentModalCloseHandler();
                    return;
                }
                if ((e.key === 'Enter' || e.key === ' ') && document.activeElement && (document.activeElement.classList.contains('book-card') || document.activeElement.classList.contains('activity-card'))) {
                    e.preventDefault();
                    document.activeElement.click();
                    return;
                }
                if (e.key === '/' && !currentModalCloseHandler && !['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) {
                    e.preventDefault();
                    if (activeTab !== 'library') {
                        window.setTab('library');
                    }
                    // Small timeout to allow tab to render if needed
                    setTimeout(() => {
                        const searchInput = document.getElementById('search-input');
                        if (searchInput) {
                            searchInput.focus();
                            searchInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }, activeTab === 'library' ? 0 : 50);
                }
            });
            let viewMode = localStorage.getItem('mylib_viewMode') || 'grid';
            let defaultSort = localStorage.getItem('mylib_defaultSort') || 'newest';
            let cardDensity = localStorage.getItem('mylib_density') || 'normal';
            let readingGoal = parseInt(localStorage.getItem('mylib_readingGoal')) || 50;
            let sharedWithMe = [];         // UIDs of users who shared their library with me
            let activities = [];           // activity log for book additions
            let metadataCache = { authors: [], genres: [], owners: [] }; // Performance optimization: single-pass cache
            let userProfileCache = {}; // Cache for user profiles (names/emails)

            let searchQuery = '';
            let searchTimeout = null;
            let sortBy = localStorage.getItem('mylib_sortBy') || defaultSort;
            let statusFilter = localStorage.getItem('mylib_statusFilter') || 'all';
            let categoryFilter = 'all';
            let authorFilter = 'all';
            let ownerFilter = 'all';
            let tagFilter = null;
            let selectedBookIds = new Set();
            let advancedFilters = {
                rating: 'all',
                minPrice: null,
                maxPrice: null,
                startDate: null,
                endDate: null
            };

            const READING_STATUSES = {
                want_to_read: { label: '', badge: 'bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-200' },
                reading: { label: 'Reading', badge: 'bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300' },
                finished: { label: 'Finished', badge: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/50 dark:text-emerald-300' },
                unread: { label: 'Want to Read', badge: 'bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-200' } // fallback for legacy data
            };

            // DOM elements
            const appEl = document.getElementById('app');
            const toastEl = document.getElementById('toast');
            const modalContainer = document.getElementById('modal-container');

            // ---------- Utilities ----------
            const DEFAULT_STATUS = Object.freeze({ status: 'want_to_read', rating: 0, progress: 0, comment: '' });

            function getCurrencySymbol() {
                const currencies = {
                    'USD': '$',
                    'EUR': '€',
                    'GBP': '£',
                    'BDT': '৳',
                    'INR': '₹',
                    'JPY': '¥'
                };
                return currencies[localStorage.getItem('mylib_currency')] || '$';
            }

            function formatPrice(amount) {
                if (amount === null || amount === undefined || isNaN(amount)) return '—';
                return getCurrencySymbol() + Number(amount).toFixed(2);
            }

            function getStatusData(bookId) {
                // Performance: Data is pre-normalized in the listener for O(1) lookup
                return readingStatuses[bookId] || DEFAULT_STATUS;
            }

            let syncTimeout = null;
            async function syncCompletedBooksCount() {
                if (!currentUser) return;

                if (syncTimeout) clearTimeout(syncTimeout);
                syncTimeout = setTimeout(async () => {
                    const count = Object.values(readingStatuses).filter(data => {
                        const status = typeof data === 'string' ? data : data.status;
                        return status === 'finished';
                    }).length;

                    if (userProfile && userProfile.completedBooksCount === count) return;

                    try {
                        await db.collection('users').doc(currentUser.uid).update({
                            completedBooksCount: count,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        if (userProfile) userProfile.completedBooksCount = count;
                    } catch (err) {
                        console.error("Error syncing completed books count:", err);
                    }
                }, 1000);
            }

            // ---------- Utility: Escape HTML ----------
            const escapeDiv = document.createElement('div');
            function escapeHTML(str) {
                if (!str) return '';
                escapeDiv.textContent = str;
                return escapeDiv.innerHTML;
            }

            function formatAIText(text) {
                if (!text) return '';
                // First sanitize the input to prevent XSS
                let formatted = escapeHTML(text);

                // Then apply markdown-like replacements on the sanitized text
                formatted = formatted
                    .replace(/^### (.*$)/gim, '<h4 class="text-base font-bold mt-4 mb-1 text-primary">$1</h4>')
                    .replace(/^## (.*$)/gim, '<h3 class="text-lg font-bold mt-6 mb-2 text-primary">$1</h3>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/^\s*[\-\*]\s*(.*)/gm, '<li class="ml-4 my-1">$1</li>')
                    .replace(/\n/g, '<br>');

                return formatted;
            }

            window.copyISBN = (isbn) => {
                if (!navigator.clipboard) {
                    showToast('Clipboard not available', 'error');
                    return;
                }
                navigator.clipboard.writeText(isbn).then(() => {
                    showToast('ISBN copied to clipboard!', 'success');
                }).catch(err => {
                    showToast('Failed to copy ISBN', 'error');
                });
            };

            // ---------- Utility: Toast ----------
            function showToast(message, type = 'info', duration = 4000) {
                if (navigator.vibrate) {
                    if (type === 'error') navigator.vibrate([50, 50, 50]);
                    else if (type === 'success') navigator.vibrate(10);
                }
                toastEl.innerHTML = `
                <div class="w-2 h-2 rounded-full ${type === 'success' ? 'bg-emerald-400' : type === 'error' ? 'bg-rose-400' : 'bg-blue-400'}"></div>
                <span>${message}</span>
            `;
                toastEl.classList.remove('opacity-0', 'translate-y-10');
                toastEl.classList.add('opacity-100', 'translate-y-0');
                setTimeout(() => {
                    toastEl.classList.add('opacity-0', 'translate-y-10');
                    toastEl.classList.remove('opacity-100', 'translate-y-0');
                }, duration);
            }

            // ---------- Modal helper ----------
            function showModal(html, onClose, isFullscreen = false) {
                const modal = document.createElement('div');
                modal.className = isFullscreen
                    ? 'fixed inset-0 z-50 flex items-center justify-center bg-slate-50 dark:bg-slate-900 transition-all'
                    : 'fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 dark:bg-slate-900/80 backdrop-blur-sm transition-all';
                modal.innerHTML = html;
                modalContainer.innerHTML = '';
                modalContainer.appendChild(modal);
                modalContainer.classList.add('pointer-events-auto');
                const closeHandler = () => {
                    modal.remove();
                    modalContainer.classList.remove('pointer-events-auto');
                    currentModalCloseHandler = null;
                    if (onClose) onClose();
                };
                currentModalCloseHandler = closeHandler;
                modal.querySelector('[data-close]')?.addEventListener('click', closeHandler);
                if (!isFullscreen) {
                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) closeHandler();
                    });
                }
                return closeHandler;
            }

                                        Continue with Google

            async function saveSharingSettings() {
                const email = document.getElementById('share-email').value.trim().toLowerCase();
                if (!email) return;

                const btn = document.getElementById('save-sharing-btn');
                const originalText = btn.innerText;
                btn.disabled = true;
                btn.innerText = 'Adding...';

                try {
                    // Find the user by email
                    const userSnapshot = await db.collection('users').where('email', '==', email).limit(1).get();
                    if (userSnapshot.empty) {
                        showToast('User not found. They must log in first.', 'error');
                        return;
                    }

                    const partnerId = userSnapshot.docs[0].id;
                    if (partnerId === currentUser.uid) {
                        showToast('You cannot share with yourself.', 'error');
                        return;
                    }

                    // Create a bidirectional partnership with sorted UIDs
                    const ids = [currentUser.uid, partnerId].sort();
                    const partnershipId = `${ids[0]}_${ids[1]}`;

                    await db.collection('partnerships').doc(partnershipId).set({
                        userId1: ids[0],
                        userId2: ids[1],
                        initiatorId: currentUser.uid,
                        user1Unsubscribed: false,
                        user2Unsubscribed: false,
                        allowAddBooks: false,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });

                    showToast(`Partnership created with ${email}!`, 'success');
                    document.getElementById('share-email').value = '';
                } catch (err) {
                    showToast('Error creating partnership: ' + err.message, 'error');
                } finally {
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            }

            // Update partnership permission to allow/disallow adding books
            window.updatePartnershipPermission = async (partnershipId, allowAddBooks) => {
                try {
                    await db.collection('partnerships').doc(partnershipId).update({
                        allowAddBooks: allowAddBooks
                    });
                    showToast(allowAddBooks ? 'Permission granted!' : 'Permission revoked', 'success');
                    renderPartners();
                } catch (err) {
                    showToast('Error updating permission: ' + err.message, 'error');
                }
            };

            let unsubscribePartners1 = null;
            let unsubscribePartners2 = null;
            let allPartnershipsForUI = [];

            function renderPartners() {
                const listEl = document.getElementById('collaborators-list');
                if (!listEl) return;

                if (unsubscribePartners1) unsubscribePartners1();
                if (unsubscribePartners2) unsubscribePartners2();

                let partners1 = [];
                let partners2 = [];

                // Query partnerships where current user is userId1
                unsubscribePartners1 = db.collection('partnerships')
                    .where('userId1', '==', currentUser.uid)
                    .onSnapshot(snapshot => {
                        partners1 = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        allPartnershipsForUI = [...partners1, ...partners2];
                        displayPartnerships();
                    }, err => {
                        console.error("Partners Query 1 Error:", err);
                    });

                // Query partnerships where current user is userId2
                unsubscribePartners2 = db.collection('partnerships')
                    .where('userId2', '==', currentUser.uid)
                    .onSnapshot(snapshot => {
                        partners2 = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        allPartnershipsForUI = [...partners1, ...partners2];
                        displayPartnerships();
                    }, err => {
                        console.error("Partners Query 2 Error:", err);
                    });

                async function displayPartnerships() {
                    const listEl = document.getElementById('collaborators-list');
                    if (!listEl) return;

                    if (allPartnershipsForUI.length === 0) {
                        listEl.innerHTML = '<p class="text-xs text-slate-400 italic px-1">No partnerships yet. Share your library to connect with friends!</p>';
                        return;
                    }

                    // Fetch partner user details
                    const partnerIds = allPartnershipsForUI.map(doc => {
                        const data = doc;
                        return data.userId1 === currentUser.uid ? data.userId2 : data.userId1;
                    });

                    const userDocs = await Promise.all(
                        partnerIds.map(id => db.collection('users').doc(id).get())
                    );

                    listEl.innerHTML = allPartnershipsForUI.map((partnership, idx) => {
                        const isUser1 = partnership.userId1 === currentUser.uid;
                        const isUnsubscribed = isUser1 ? partnership.user1Unsubscribed : partnership.user2Unsubscribed;
                        const partnerUnsubscribed = isUser1 ? partnership.user2Unsubscribed : partnership.user1Unsubscribed;
                        const partnerName = userDocs[idx].data()?.displayName || userDocs[idx].data()?.email || 'Unknown';
                        const allowAddBooks = partnership.allowAddBooks || false;

                        return `
                        <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-100 dark:border-slate-800 gap-4">
                            <div class="flex-1">
                                <span class="text-sm font-medium block">${escapeHTML(partnerName)}</span>
                                ${isUnsubscribed ? '<span class="text-xs text-slate-500 italic">You unfollowed this partnership</span>' : partnerUnsubscribed ? '<span class="text-xs text-slate-500 italic">Partner unfollowed this partnership</span>' : '<span class="text-xs text-emerald-600 dark:text-emerald-400 font-medium">Active partnership</span>'}
                            </div>
                            <div class="flex items-center gap-3">
                                <label class="flex items-center gap-2 cursor-pointer ${isUnsubscribed ? 'opacity-50 pointer-events-none' : ''}">
                                    <input type="checkbox" ${allowAddBooks ? 'checked' : ''} onchange="window.updatePartnershipPermission('${partnership.id}', this.checked)" class="w-4 h-4 rounded text-blue-600 focus:ring-blue-500" title="Allow this partner to add books to your library">
                                    <span class="text-xs font-medium whitespace-nowrap">Can add books</span>
                                </label>
                                <button onclick="window.leavePartnership('${partnership.id}')" class="text-rose-500 hover:text-rose-600 p-1 font-medium text-xs whitespace-nowrap">
                                    ${isUnsubscribed ? 'Rejoin' : 'Unfollow'}
                                </button>
                            </div>
                        </div>
                    `;
                    }).join('');
                }
            }

            window.leavePartnership = async (partnershipId) => {
                try {
                    const partnershipDoc = await db.collection('partnerships').doc(partnershipId).get();
                    const data = partnershipDoc.data();
                    const isUser1 = data.userId1 === currentUser.uid;

                    // Toggle unsubscribed status for current user
                    const currentStatus = isUser1 ? data.user1Unsubscribed : data.user2Unsubscribed;
                    const updateData = isUser1 ? { user1Unsubscribed: !currentStatus } : { user2Unsubscribed: !currentStatus };

                    await db.collection('partnerships').doc(partnershipId).update(updateData);
                    showToast(!currentStatus ? 'Partnership unfollowed' : 'Partnership rejoined', 'info');
                    subscribeToBooks();
                } catch (err) {
                    showToast('Error: ' + err.message, 'error');
                }
            };

            function setupSearchableDropdown(inputId, menuId, dataList, onAdd) {
                const input = document.getElementById(inputId);
                const menu = document.getElementById(menuId);
                if (!input || !menu) return;

                let selectedIndex = -1;

                const renderMenu = (filter = '') => {
                    const filtered = dataList.filter(item => item.toLowerCase().includes(filter.toLowerCase()));
                    let items = filtered.map(item => ({ type: 'item', value: item }));

                    if (filter && !filtered.some(item => item.toLowerCase() === filter.toLowerCase())) {
                        items.push({ type: 'add', value: filter });
                    }

                    let html = items.map((item, i) => `
                    <div class="dropdown-item ${i === selectedIndex ? 'bg-slate-100 dark:bg-slate-700 text-blue-600' : ''} ${item.type === 'add' ? 'font-bold text-blue-600 dark:text-blue-400 border-t border-slate-100 dark:border-slate-800' : ''}"
                         data-value="${item.value}"
                         data-action="${item.type}"
                         data-index="${i}">
                        ${item.type === 'add' ? `+ Add "${item.value}"` : item.value}
                    </div>
                `).join('');

                    menu.innerHTML = html;
                    menu.style.display = html ? 'block' : 'none';
                    return items.length;
                };

                input.addEventListener('focus', () => {
                    selectedIndex = -1;
                    renderMenu(input.value);
                });
                input.addEventListener('input', () => {
                    selectedIndex = -1;
                    renderMenu(input.value);
                });

                input.addEventListener('keydown', (e) => {
                    const items = menu.querySelectorAll('.dropdown-item');
                    if (menu.style.display === 'none') {
                        if (e.key === 'ArrowDown') renderMenu(input.value);
                        return;
                    }

                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
                        renderMenu(input.value);
                        menu.querySelectorAll('.dropdown-item')[selectedIndex]?.scrollIntoView({ block: 'nearest' });
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        selectedIndex = Math.max(selectedIndex - 1, 0);
                        renderMenu(input.value);
                        menu.querySelectorAll('.dropdown-item')[selectedIndex]?.scrollIntoView({ block: 'nearest' });
                    } else if (e.key === 'Enter' && selectedIndex >= 0) {
                        e.preventDefault();
                        const item = items[selectedIndex];
                        if (item.dataset.action === 'add') {
                            onAdd(item.dataset.value);
                        } else {
                            input.value = item.dataset.value;
                        }
                        menu.style.display = 'none';
                    } else if (e.key === 'Escape') {
                        menu.style.display = 'none';
                    }
                });

                document.addEventListener('click', (e) => {
                    if (!input.contains(e.target) && !menu.contains(e.target)) {
                        menu.style.display = 'none';
                    }
                });

                menu.addEventListener('click', (e) => {
                    const item = e.target.closest('.dropdown-item');
                    if (!item) return;

                    if (item.dataset.action === 'add') {
                        onAdd(item.dataset.value);
                    } else {
                        input.value = item.dataset.value;
                    }
                    menu.style.display = 'none';
                });
            }

            const GENRE_FALLBACK = ['Other'];
            // Helper to get book genres as an array
            function getBookGenres(book) {
                if (Array.isArray(book.categories)) return book.categories;
                if (book.category) return [book.category];
                return GENRE_FALLBACK;
            }

            /**
             * ⚡ Bolt: Pre-normalize book data to speed up filtering and sorting.
             * This reduces redundant computations in render loops.
             */
            function normalizeBook(book) {
                const genres = getBookGenres(book);
                const searchParts = [
                    book.title,
                    book.author,
                    ...genres,
                    book.isbn,
                    ...(book.tags || [])
                ];

                return {
                    ...book,
                    _genres: genres,
                    _searchStr: searchParts.filter(Boolean).join(' ').toLowerCase(),
                    _purchaseTime: book.purchaseDate ? new Date(book.purchaseDate).getTime() : 0,
                    _createdTime: book.createdAt?.toMillis() || 0
                };
            }

            const STAR_CACHE = Object.freeze({
                0: '☆☆☆☆☆',
                1: '★☆☆☆☆',
                2: '★★☆☆☆',
                3: '★★★☆☆',
                4: '★★★★☆',
                5: '★★★★★'
            });

            // Performance optimization: Update metadata cache in a single pass over the books array
            function updateMetadataCache() {
                const authorsSet = new Set();
                const genresSet = new Set();
                const ownersSet = new Set();

                books.forEach(b => {
                    if (b.author) authorsSet.add(b.author);
                    if (b.owner) ownersSet.add(b.owner);
                    getBookGenres(b).forEach(g => {
                        if (g) genresSet.add(g);
                    });
                });

                metadataCache.authors = [...authorsSet].sort();
                metadataCache.genres = [...genresSet].sort();
                metadataCache.owners = [...ownersSet].sort();
            }

            // Helper to render a single book card
            function renderBookCard(book) {

                        </div>
                        <div class="w-12 h-16 bg-slate-100 dark:bg-slate-800 rounded-lg overflow-hidden flex-shrink-0 border border-slate-200 dark:border-slate-700">
                            ${book.coverUrl || book.thumbnail ? `<img src="${book.coverUrl || book.thumbnail}" class="w-full h-full object-cover">` : '<div class="w-full h-full flex items-center justify-center bg-blue-50 dark:bg-slate-700 text-[8px] text-blue-300 dark:text-slate-500 font-bold uppercase p-1 text-center">No Cover</div>'}
                        </div>
                        <div class="flex-1 min-w-0">

                            <div class="flex flex-wrap gap-1 mt-1">
                                ${(book.tags || []).map(tag => `<button onclick="event.stopPropagation(); window.setTagFilter('${tag}')" class="text-[8px] bg-slate-100 dark:bg-slate-700 px-1.5 rounded-full hover:bg-blue-100 dark:hover:bg-blue-900 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 outline-none" aria-label="Filter by tag: ${tag}">${tag}</button>`).join('')}
                            </div>

                        <div class="text-right flex-shrink-0 flex flex-col items-end">

                            <div class="text-[10px] font-bold text-primary dark:text-primary mt-1 truncate max-w-[120px] text-right">
                                ${bookGenres.map((g, i) => {
                                    const escapedG = escapeHTML(g);
                                    const jsEscapedG = g.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                                    return `<button onclick="event.stopPropagation(); window.setCategoryFilter('${jsEscapedG}')" class="hover:text-blue-700 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 outline-none rounded" aria-label="Filter by genre: ${escapedG}">${escapedG}</button>${i < bookGenres.length - 1 ? '<span class="text-slate-300">, </span>' : ''}`;
                                }).join('')}
                            </div>
                            ${book.owner ? `<button class="text-[8px] font-medium text-slate-400 mt-1 truncate max-w-[80px] hover:text-blue-500 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 outline-none text-right" onclick="event.stopPropagation(); window.setOwnerFilter('${(book.owner).replace(/'/g, "\\'")}')" aria-label="Filter by owner: ${book.owner}">Owner: ${book.owner}</button>` : ''}
                            <div class="flex items-center gap-2 mt-1">
                                <button class="p-1 hover:bg-blue-50 dark:hover:bg-slate-700 rounded-full transition-colors opacity-0 group-hover:opacity-100 group-focus-within:opacity-100" aria-label="Edit book details">
                                    <svg class="w-3.5 h-3.5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                                </button>
                                <div class="inline-flex px-2 py-0.5 rounded-full text-[9px] font-bold ${READING_STATUSES[bookStatus].badge}">
                                    ${statusData.isWishlist ? 'Wishlist' : (bookStatus === 'reading' ? `Reading (${userProgress || book.progress || 0}%)` : READING_STATUSES[bookStatus].label)}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                }

                const densityClass = cardDensity === 'relaxed' ? 'density-relaxed' : cardDensity === 'compact' ? 'density-compact' : '';
                return `
                <div class="book-card glass p-5 rounded-[2.5rem] flex gap-5 cursor-pointer hover:shadow-xl group border ${isSelected ? 'border-primary ring-4 ring-primary/10 shadow-xl' : 'border-blue-100/50 dark:border-slate-800'} relative ${densityClass} focus-visible:ring-4 focus-visible:ring-primary/20 outline-none" data-book-id="${book.id}" tabindex="0" role="button" aria-label="${escapeHTML(book.title)} by ${escapeHTML(book.author || 'Unknown author')}">
                    <div class="absolute top-4 left-4 z-20 opacity-0 group-hover:opacity-100 group-focus-within:opacity-100 transition-opacity">
                        <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); window.toggleSelection('${book.id}')" class="w-6 h-6 rounded-lg border-white/20 bg-white/20 backdrop-blur-sm text-blue-600 focus:ring-blue-500 shadow-lg cursor-pointer">
                    </div>
                    <div class="w-28 h-40 bg-slate-100 dark:bg-slate-800 rounded-3xl overflow-hidden flex-shrink-0 border border-slate-200 dark:border-slate-700 relative shadow-lg">
                        ${bookStatus === 'reading' ? `
                            <div class="absolute bottom-0 left-0 right-0 h-1.5 bg-slate-200/50 z-10" role="progressbar" aria-valuenow="${userProgress || book.progress || 0}" aria-valuemin="0" aria-valuemax="100" aria-label="Reading progress: ${userProgress || book.progress || 0}%">
                                <div class="h-full bg-primary" style="width: ${userProgress || book.progress || 0}%"></div>

                        ${book.coverUrl || book.thumbnail ?
                        `<img src="${book.coverUrl || book.thumbnail}" class="w-full h-full object-cover transition group-hover:scale-110" alt="cover">` :
                        `<div class="w-full h-full flex items-center justify-center bg-blue-50 dark:bg-slate-800 text-blue-200 dark:text-slate-600 text-[10px] font-bold uppercase p-2 text-center">No Cover</div>`
                    }
                        
                    </div>
                    <div class="flex-1 flex flex-col justify-between overflow-hidden py-1">
                        <div>
                            <div class="flex justify-between items-start gap-2">
                                <div class="text-[9px] font-black uppercase tracking-widest text-primary truncate max-w-[150px]">
                                    ${bookGenres.map((g, i) => {
                                        const escapedG = escapeHTML(g);
                                        const jsEscapedG = g.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                                        return `<button onclick="event.stopPropagation(); window.setCategoryFilter('${jsEscapedG}')" class="hover:text-blue-700 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 outline-none rounded" aria-label="Filter by genre: ${escapedG}">${escapedG}</button>${i < bookGenres.length - 1 ? '<span class="text-slate-300">, </span>' : ''}`;
                                    }).join('')}
                                </div>
                                <div class="text-amber-400 text-[13px] tracking-tighter">${stars}${book.averageRating ? `<span class="ml-1 text-slate-400">(${book.averageRating.toFixed(1)})</span>` : ''}</div>
                            </div>
                            <h3 class="font-black text-lg leading-tight line-clamp-2 mt-1 group-hover:text-blue-600 transition-colors font-serif italic">${book.title}</h3>
                            <div class="flex justify-between items-center gap-2">
                                <button class="text-sm text-slate-500 dark:text-slate-400 mt-1 truncate font-medium hover:text-blue-500 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 outline-none text-left" onclick="event.stopPropagation(); window.setAuthorFilter('${(book.author || 'Unknown').replace(/'/g, "\\'")}')" aria-label="Filter by author: ${book.author || 'Unknown'}">${book.author || 'Unknown'}</button>
                                ${book.owner ? `<button class="text-[10px] text-slate-400 font-medium truncate hover:text-blue-500 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 outline-none text-right" onclick="event.stopPropagation(); window.setOwnerFilter('${(book.owner).replace(/'/g, "\\'")}')" aria-label="Filter by owner: ${book.owner}">Owner: ${book.owner}</button>` : ''}
                            </div>
                            <div class="flex flex-wrap gap-1 mt-2">
                                ${(book.tags || []).map(tag => `<button onclick="event.stopPropagation(); window.setTagFilter('${tag}')" class="text-[9px] bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded-full text-slate-500 hover:bg-blue-100 dark:hover:bg-blue-900/50 hover:text-blue-600 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500 outline-none" aria-label="Filter by tag: ${tag}">${tag}</button>`).join('')}
                            </div>
                            <div class="mt-2 flex flex-wrap gap-1">
                                <div class="inline-flex px-2 py-0.5 rounded-full text-[9px] font-bold ${READING_STATUSES[bookStatus].badge}">
                                    ${statusData.isWishlist ? 'Wishlist' : (bookStatus === 'reading' ? `Reading (${userProgress || book.progress || 0}%)` : READING_STATUSES[bookStatus].label)}
                                </div>
                                ${book.borrowedBy ? `<div class="inline-flex px-2 py-0.5 rounded-full text-[9px] font-bold bg-amber-100 text-amber-700 dark:bg-amber-900/50 dark:text-amber-300">Borrowed by ${book.borrowedBy}</div>` : ''}
                                ${addedByBadge}
                            </div>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-[10px] font-bold text-slate-400">${book.purchaseDate ? new Date(book.purchaseDate).toLocaleDateString() : ''}</span>
                            <div class="flex items-center gap-2">
                                <span class="text-slate-900 dark:text-white font-black text-sm">${book.price ? getCurrencySymbol() + book.price : ''}</span>
                                <button class="p-2 hover:bg-blue-50 dark:hover:bg-slate-700 rounded-full transition-colors opacity-0 group-hover:opacity-100 group-focus-within:opacity-100" aria-label="Edit book details">
                                    <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            }

            // ---------- Firestore Sync ----------
            let unsubscribePartnershipBooks1 = null;
            let unsubscribePartnershipBooks2 = null;
            let unsubscribeOwnBooks = null;
            let unsubscribeActivity = null;
            let allPartnerships = [];

            async function subscribeToBooks() {
                if (unsubscribeBooks) unsubscribeBooks();
                if (unsubscribeStatus) unsubscribeStatus();
                if (unsubscribePartnershipBooks1) unsubscribePartnershipBooks1();
                if (unsubscribePartnershipBooks2) unsubscribePartnershipBooks2();
                if (unsubscribeOwnBooks) unsubscribeOwnBooks();
                if (unsubscribeActivity) unsubscribeActivity();
                if (!currentUser) return;

                let partnerships1 = [];
                let partnerships2 = [];

                // Query partnerships where current user is userId1
                unsubscribePartnershipBooks1 = db.collection('partnerships')
                    .where('userId1', '==', currentUser.uid)
                    .onSnapshot(snapshot => {
                        partnerships1 = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        allPartnerships = [...partnerships1, ...partnerships2];
                        fetchBooksFromPartnerships();
                    }, err => {
                        console.error("Partnership Query 1 Error:", err);
                    });

                // Query partnerships where current user is userId2
                unsubscribePartnershipBooks2 = db.collection('partnerships')
                    .where('userId2', '==', currentUser.uid)
                    .onSnapshot(snapshot => {
                        partnerships2 = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        allPartnerships = [...partnerships1, ...partnerships2];
                        fetchBooksFromPartnerships();
                    }, err => {
                        console.error("Partnership Query 2 Error:", err);
                    });

                function fetchBooksFromPartnerships() {
                    // Build list of user IDs to fetch books from
                    let userIdsToFetch = [currentUser.uid];

                    allPartnerships.forEach(partnership => {
                        const isUser1 = partnership.userId1 === currentUser.uid;
                        // Only include partner if current user hasn't unsubscribed
                        const currentUserUnsubscribed = isUser1 ? partnership.user1Unsubscribed : partnership.user2Unsubscribed;
                        if (!currentUserUnsubscribed) {
                            const partnerId = isUser1 ? partnership.userId2 : partnership.userId1;
                            if (!userIdsToFetch.includes(partnerId)) {
                                userIdsToFetch.push(partnerId);
                            }
                        }
                    });

                    // Firestore 'in' query supports max 10-30 items
                    if (unsubscribeOwnBooks) {
                        if (Array.isArray(unsubscribeOwnBooks)) unsubscribeOwnBooks.forEach(unsub => unsub());
                        else unsubscribeOwnBooks();
                    }

                    const bookUnsubs = [];
                    let chunkedBooks = {};

                    for (let i = 0; i < userIdsToFetch.length; i += 10) {
                        const chunk = userIdsToFetch.slice(i, i + 10);
                        const unsub = db.collection('books')
                            .where('userId', 'in', chunk)
                            .onSnapshot(snapshot => {
                                chunkedBooks[i] = snapshot.docs.map(doc => normalizeBook({ id: doc.id, ...doc.data() }));

                                // Merge and sort all chunked books
                                books = Object.values(chunkedBooks).flat().sort((a, b) => b._createdTime - a._createdTime);
                                updateMetadataCache();
                                renderMainApp();
                            }, err => {
                                console.error("Firestore Error for chunk:", chunk, err);
                            });
                        bookUnsubs.push(unsub);
                    }
                    unsubscribeOwnBooks = bookUnsubs;

                    // Subscribe to activity feed for these libraries
                    if (unsubscribeActivity) {
                        if (Array.isArray(unsubscribeActivity)) unsubscribeActivity.forEach(unsub => unsub());
                        else unsubscribeActivity();
                    }

                    const activityUnsubs = [];
                    let chunkedActivities = {};

                    for (let i = 0; i < userIdsToFetch.length; i += 10) {
                        const chunk = userIdsToFetch.slice(i, i + 10);
                        const unsub = db.collection('activityFeed')
                            .where('libraryId', 'in', chunk)
                            .orderBy('timestamp', 'desc')
                            .limit(30)
                            .onSnapshot(snapshot => {
                                chunkedActivities[i] = snapshot.docs.map(doc => ({
                                    id: doc.id,
                                    ...doc.data(),
                                    timestamp: doc.data().timestamp?.toDate() || new Date()
                                }));

                                // Merge and sort all chunked activities
                                activities = Object.values(chunkedActivities).flat().sort((a, b) => b.timestamp - a.timestamp).slice(0, 50);
                                if (activeTab === 'activity') renderMainApp();
                            }, err => {
                                console.error("Activity Listener Error for chunk:", chunk, err);
                            });
                        activityUnsubs.push(unsub);
                    }
                    unsubscribeActivity = activityUnsubs;
                }

                // Use a collection group listener to get reading statuses for THIS user efficiently.
                // Performance optimization: use docChanges() for incremental updates instead of re-processing the entire collection.
                // This reduces the update complexity from O(N) to O(1) for most sync events.
                unsubscribeStatus = db.collectionGroup('readingStatus')
                    .where('userId', '==', currentUser.uid)
                    .onSnapshot(snapshot => {
                        snapshot.docChanges().forEach(change => {
                            const bookId = change.doc.ref.parent.parent.id;
                            if (change.type === 'removed') {
                                delete readingStatuses[bookId];
                            } else {
                                const data = change.doc.data();
                                // Normalize data upon receipt to optimize render performance
                                readingStatuses[bookId] = {
                                    status: data.status === 'unread' ? 'want_to_read' : (data.status || 'want_to_read'),
                                    rating: data.rating || 0,
                                    progress: data.progress || 0,
                                    comment: data.comment || '',
                                    isWishlist: data.isWishlist || false
                                };
                            }
                        });
                        renderLibraryOnly();
                        syncCompletedBooksCount();
                    }, err => {
                        console.error("Status Listener Error (Ensure index is created):", err);
                    });
            }

            // ---------- Scanner Logic ----------
            let scanner = null;
            let globalScanTargetLibrary = null; // Store globally for scanner flow

            // Helper: Show library selector for scanner
            async function showLibrarySelectorForScan() {
                const partnersWhoAllowAdding = allPartnershipsForUI.filter(p => p.allowAddBooks === true).map(p => {
                    const isUser1 = p.userId1 === currentUser.uid;
                    const partnerId = isUser1 ? p.userId2 : p.userId1;
                    return { partnershipId: p.id, userId: partnerId, isActive: isUser1 ? !p.user1Unsubscribed : !p.user2Unsubscribed };
                }).filter(p => p.isActive);

                if (partnersWhoAllowAdding.length === 0) {
                    globalScanTargetLibrary = currentUser.uid;
                    return;
                }

                return new Promise((resolve) => {
                    let destHtml = `
                    <div class="glass max-w-md w-full rounded-[2.5rem] p-8 shadow-2xl animate-slide-up">
                        <h2 class="text-2xl font-black mb-4">Add To Which Library?</h2>
                        <div class="space-y-3">
                            <label class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer border-2 border-transparent" data-dest="${currentUser.uid}">
                                <input type="radio" name="scan-library-dest" value="${currentUser.uid}" checked class="w-5 h-5 text-blue-600">
                                <span class="font-medium">My Library</span>
                            </label>
                    `;

                    partnersWhoAllowAdding.forEach(p => {
                        destHtml += `
                            <label class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer border-2 border-transparent" data-dest="${p.userId}" data-partner-id="${p.userId}">
                                <input type="radio" name="scan-library-dest" value="${p.userId}" class="w-5 h-5 text-blue-600">
                                <span class="font-medium" data-name="">Loading...</span>
                            </label>
                        `;
                    });

                    destHtml += `
                        <div class="flex gap-4 mt-8">
                            <button data-close class="flex-1 px-4 py-4 bg-slate-200 dark:bg-slate-700 rounded-2xl font-bold">Cancel</button>
                            <button id="scan-start-btn" class="flex-1 px-4 py-4 bg-blue-600 text-white rounded-2xl font-bold">Start Scan</button>
                        </div>
                    </div>
                    `;

                    const close = showModal(destHtml);

                    // Fetch partner names
                    Promise.all(partnersWhoAllowAdding.map(p =>
                        db.collection('users').doc(p.userId).get()
                    )).then(docs => {
                        partnersWhoAllowAdding.forEach((p, idx) => {
                            const label = modalContainer.querySelector(`[data-partner-id="${p.userId}"]`);
                            const nameSpan = label?.querySelector('[data-name]');
                            if (nameSpan && docs[idx].exists) {
                                const name = docs[idx].data()?.displayName || docs[idx].data()?.email || 'Partner';
                                nameSpan.textContent = `${name}'s Library`;
                            }
                        });
                    });

                    document.getElementById('scan-start-btn').addEventListener('click', () => {
                        const selected = document.querySelector('input[name="scan-library-dest"]:checked');
                        globalScanTargetLibrary = selected ? selected.value : currentUser.uid;
                        close();
                        resolve();
                    });
                });
            }

            function openScanner() {
                showLibrarySelectorForScan().then(() => {
                    const modalHtml = `
                    <div class="w-full h-full flex flex-col p-6 overflow-y-auto">
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-3xl font-black font-serif italic">Scan QR / Barcode</h2>
                            <button data-close class="p-3 bg-slate-100 dark:bg-slate-800 rounded-full hover:bg-slate-200 transition-colors" aria-label="Close scanner"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
                        </div>
                        <div class="flex-1 flex flex-col items-center justify-center">
                            <div id="reader" class="w-full max-w-lg aspect-square rounded-[3rem] overflow-hidden bg-slate-900 relative shadow-2xl">
                                <!-- Overlay for a more professional look -->
                                <div class="absolute inset-0 border-[40px] border-slate-900/40 pointer-events-none"></div>
                                <div class="absolute inset-[40px] border-2 border-blue-500/50 rounded-lg pointer-events-none animate-pulse"></div>
                            </div>
                            <p class="text-sm text-center text-slate-400 mt-8 uppercase tracking-widest font-bold">Align code within the frame</p>
                        </div>
                    </div>
                `;
                    const closeScanner = showModal(modalHtml, () => stopScanner(), true);

                    scanner = new Html5Qrcode("reader");
                    const config = {
                        fps: 20,
                        qrbox: { width: 250, height: 150 },
                        aspectRatio: 1.0
                    };

                    scanner.start(
                        { facingMode: "environment" },
                        config,
                        onScanSuccess,
                        onScanFailure
                    ).catch(err => {
                        console.warn("Camera start failed, falling back to any camera", err);
                        scanner.start({ facingMode: "user" }, config, onScanSuccess, onScanFailure);
                    });
                });
            }

            function stopScanner() {
                if (scanner) {
                    try { scanner.stop(); } catch (e) { }
                    scanner = null;
                }
            }

            async function onScanSuccess(decodedText) {
                if (navigator.vibrate) navigator.vibrate(50);
                stopScanner();
                modalContainer.innerHTML = '';
                modalContainer.classList.remove('pointer-events-auto');
                showToast('Processing code...', 'info');
                await fetchBookDetails(decodedText);
            }

            function onScanFailure(err) { /* silent */ }

            // ---------- Fetch Book Details (Google Books + Open Library + Smart Parsing) ----------
            async function fetchBookDetails(query) {
                // Try smart parse first
                const parsed = parseBookText(query);
                if (parsed && parsed.title) {
                    showApprovalModal(parsed, query);
                    return;
                }

                // Clean ISBN
                const clean = query.replace(/[^0-9X]/gi, '');
                const lookupTerm = clean || query.trim();

                let bookResult = null;

                try {
                    // 1. Try Google Books
                    let res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${lookupTerm}`);
                    let data = await res.json();
                    if (!data.items && !clean) {
                        res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=1`);
                        data = await res.json();
                    }

                    if (data.items && data.items.length > 0) {
                        const info = data.items[0].volumeInfo;
                        bookResult = {
                            title: info.title || 'Untitled',
                            author: info.authors ? info.authors.join(', ') : 'Unknown',
                            category: info.categories ? info.categories[0] : 'Other',
                            isbn: clean || (info.industryIdentifiers ? info.industryIdentifiers[0].identifier : ''),
                            thumbnail: info.imageLinks ? info.imageLinks.thumbnail.replace('http:', 'https:') : null,
                            tags: info.categories || []
                        };
                    }

                    // 2. Try Open Library if Google failed or thumbnail is missing
                    if (clean && (!bookResult || !bookResult.thumbnail)) {
                        const olRes = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${clean}&format=json&jscmd=data`);
                        const olData = await olRes.json();
                        const olBook = olData[`ISBN:${clean}`];

                        if (olBook) {
                            if (!bookResult) {
                                bookResult = {
                                    title: olBook.title,
                                    author: olBook.authors ? olBook.authors.map(a => a.name).join(', ') : 'Unknown',
                                    category: olBook.subjects ? olBook.subjects[0].name : 'Other',
                                    isbn: clean,
                                    tags: olBook.subjects ? olBook.subjects.map(s => s.name) : []
                                };
                            }
                            if (olBook.cover) {
                                bookResult.thumbnail = olBook.cover.large || olBook.cover.medium || olBook.cover.small;
                            }
                        }
                    }
                } catch (err) {
                    console.error("Fetch error:", err);
                }

                if (bookResult) {
                    const book = {
                        ...bookResult,
                        price: null,
                        purchaseDate: new Date().toISOString(),
                        comments: '',
                        source: 'scanned',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    addBookToFirestore(book, 'want_to_read', globalScanTargetLibrary || currentUser.uid);
                } else {
                    showToast('No book found. Please enter details.', 'info');
                    openManualEntry(query);
                }
            }

            function parseBookText(text) {
                const result = { title: null, author: null, isbn: null };
                const titleMatch = text.match(/(?:title|book)[:\s]+([^\n\r]+)/i);
                if (titleMatch) result.title = titleMatch[1].trim();
                const authorMatch = text.match(/(?:author|by)[:\s]+([^\n\r]+)/i);
                if (authorMatch) result.author = authorMatch[1].trim();
                const isbnMatch = text.match(/isbn[:\s]*([0-9-]+)/i);
                if (isbnMatch) result.isbn = isbnMatch[1].trim();
                return result.title ? result : null;
            }

                `;

                const close = showModal(modalHtml);

                const searchInput = document.getElementById('select-book-search');
                const listContainer = document.getElementById('select-book-list');

                if (searchInput && listContainer) {
                    searchInput.addEventListener('input', (e) => {

                        const filtered = myBooks.filter(b => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q));
                        listContainer.innerHTML = filtered.length > 0 ? filtered.map(b => `
                            <button onclick="window.markAsFinished('${b.id}')" class="w-full flex items-center gap-4 p-3 bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-2xl hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-all text-left group focus-visible:ring-2 focus-visible:ring-blue-500 outline-none">
                                <img src="${b.coverUrl || b.thumbnail || 'https://via.placeholder.com/40x60?text=No+Cover'}" class="w-12 h-16 object-cover rounded-lg shadow-sm">

                                    <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>

                window.markAsFinished = async (id) => {
                    try {
                        const b = books.find(book => book.id === id);
                        await db.collection('books').doc(id).collection('readingStatus').doc(currentUser.uid).set({
                            status: 'finished',
                            userId: currentUser.uid,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()

                        await db.collection('activityFeed').add({
                            type: 'status_updated',

                        close();
                    } catch (err) {
                        showToast('Error: ' + err.message, 'error');
                    }

            // Helper for duplicate detection within a specific user's library
            function findDuplicateBook(bookData, targetUserId) {
                const isbn = bookData.isbn?.replace(/[^0-9X]/gi, '');
                const title = bookData.title?.trim().toLowerCase();
                const author = bookData.author?.trim().toLowerCase();

                const targetLibraryBooks = books.filter(b => b.userId === targetUserId);

                let duplicate = null;
                if (isbn) {
                    duplicate = targetLibraryBooks.find(b => b.isbn?.replace(/[^0-9X]/gi, '') === isbn);
                }
                if (!duplicate && title && author) {
                    duplicate = targetLibraryBooks.find(b => b.title?.trim().toLowerCase() === title && b.author?.trim().toLowerCase() === author);
                }
                return duplicate;
            }

            // ---------- Firestore Write ----------
            async function addBookToFirestore(bookData, status = 'want_to_read', targetUserId = null) {
                if (!currentUser) return;
                targetUserId = targetUserId || currentUser.uid;
                const isAddingToSharedLibrary = targetUserId !== currentUser.uid;

                try {
                    // Check for duplicate in TARGET library
                    const duplicate = findDuplicateBook(bookData, targetUserId);

                    if (duplicate) {
                        const targetName = targetUserId === currentUser.uid ? 'your library' : 'this library';
                        const confirmUpdate = confirm(`This book ("${duplicate.title}") is already in ${targetName}. Would you like to update the existing record instead?`);
                        if (!confirmUpdate) return null;

                        const updateData = {
                            ...bookData,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        };
                        delete updateData.createdAt;
                        delete updateData.userId;
                        delete updateData.readingStatus;
                        delete updateData.isWishlist;

                        await db.collection('books').doc(duplicate.id).update(updateData);

                        // Update per-user reading status
                        await db.collection('books').doc(duplicate.id)
                            .collection('readingStatus').doc(currentUser.uid).set({
                                status: status,
                                rating: bookData.rating || 0,
                                progress: bookData.progress || 0,
                                comment: bookData.comments || '',
                                isWishlist: bookData.isWishlist || false,
                                userId: currentUser.uid,
                                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                            }, { merge: true });

                        showToast('Existing book updated!', 'success');
                        return duplicate.id;
                    }

                    // Ensure default values to prevent visibility issues
                    const finalData = {
                        title: 'Untitled',
                        author: 'Unknown',
                        categories: ['Other'],
                        rating: 0,
                        source: 'manual',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        ...bookData,
                        userId: targetUserId
                    };
                    delete finalData.isWishlist;

                    // Track who added the book if it's being added to someone else's library
                    if (isAddingToSharedLibrary) {
                        finalData.addedBy = currentUser.uid;
                    }

                    delete finalData.readingStatus; // Don't store status on the book itself

                    const docRef = await db.collection('books').add(finalData);

                    // Save per-user reading status in subcollection
                    await docRef.collection('readingStatus').doc(currentUser.uid).set({
                        status: status,
                        rating: finalData.rating || 0,
                        progress: finalData.progress || 0,
                        comment: finalData.comments || '',
                        isWishlist: bookData.isWishlist || false,
                        userId: currentUser.uid,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });

                    showToast('Book added!', 'success');

                    // Track activity for everyone
                    const partner = allPartnershipsForUI?.find(p => (p.userId1 === targetUserId || p.userId2 === targetUserId) && (p.userId1 !== targetUserId || p.userId2 !== targetUserId));
                    const targetUserName = targetUserId === currentUser.uid ? 'My' : 'Partner';
                    await db.collection('activityFeed').add({
                        type: 'book_added',
                        bookTitle: bookData.title || 'Unknown',
                        userName: currentUser.displayName || currentUser.email || currentUser.uid,
                        userId: currentUser.uid,
                        addedTo: targetUserName,
                        libraryId: targetUserId,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        bookId: docRef.id
                    });

                    return docRef.id;
                } catch (err) {
                    console.error("=== SAVE ERROR ===");
                    console.error('Error message:', err.message);
                    console.error('Error code:', err.code);
                    console.error('Full error:', err);

                    // Enhanced debugging for permission errors
                    if (err.code === 'permission-denied') {
                        console.error('PERMISSION DENIED - Debugging info:');
                        console.error('- Trying to add book to userId:', targetUserId);
                        console.error('- Current user:', currentUser.uid);
                        console.error('- Is shared library:', isAddingToSharedLibrary);

                        if (isAddingToSharedLibrary) {
                            const partnershipId = currentUser.uid < targetUserId ?
                                currentUser.uid + '_' + targetUserId :
                                targetUserId + '_' + currentUser.uid;
                            console.error('- Partnership ID:', partnershipId);
                            console.error('- Check Firestore: partnerships/' + partnershipId);
                            console.error('- Verify allowAddBooks field is set to true');
                        }
                    }

                    showToast('Error saving: ' + err.message, 'error');
                }
            }

            function renderPieChart(entries, total, colors, centerValue, centerLabel, title, filterType, showCenter = true) {
                let currentPercent = 0;

                // Standard Color Palette
                const palette = colors && colors.length > 0 ? colors : [
                    '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6',
                    '#ec4899', '#06b6d4', '#f97316', '#14b8a6', '#6366f1'
                ];

                const chartSegments = entries.map(([label, count], i) => {
                    if (total === 0) return '';
                    const percent = (count / total) * 100;
                    const offset = currentPercent;
                    currentPercent += percent;
                    const color = palette[i % palette.length];

                    return `<circle cx="50" cy="50" r="40" fill="none" stroke="${color}" stroke-width="12"
                        stroke-dasharray="${percent} ${100 - percent}" stroke-dashoffset="${-offset}"
                        pathLength="100" class="pie-slice cursor-pointer transition-all duration-500 hover:stroke-[14] hover:opacity-80"
                        onclick="const isExp = this.classList.contains('exploding'); this.parentElement.querySelectorAll('.pie-slice').forEach(s => s.classList.remove('exploding')); if(!isExp) this.classList.add('exploding');">
                        <title>${label}: ${count} books (${Math.round(percent)}%)</title>
                    </circle>`;
                }).join('');

                return `
                    <div class="relative w-44 h-44 flex-shrink-0 mx-auto sm:mx-0">
                        <svg viewBox="0 0 100 100" class="w-full h-full transform -rotate-90 overflow-visible">
                            <circle cx="50" cy="50" r="40" fill="none" stroke="#f1f5f9" stroke-width="12" class="dark:stroke-slate-800 opacity-20" />
                            ${chartSegments}
                            <circle cx="50" cy="50" r="28" fill="white" class="dark:fill-slate-900 shadow-inner" />
                        </svg>
                        ${showCenter ? `
                        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none text-center">
                            <span class="text-2xl font-black font-serif italic text-primary">${centerValue}</span>
                            <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">${centerLabel}</span>
                        </div>
                        ` : ''}
                    </div>
                    <div class="flex-1 w-full text-left">
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">${title}</h3>
                        <div class="grid grid-cols-1 gap-x-6 gap-y-2">
                            ${entries.slice(0, 6).map(([label, count], i) => {
                                const clickHandler = filterType ? `onclick='window.applyInsightFilter("${filterType}", "${label.replace(/"/g, "&quot;")}")'` : '';
                                return `
                                <div class="flex items-center justify-between text-sm py-1 border-b border-slate-50 dark:border-slate-800/50 ${filterType ? 'cursor-pointer group' : ''}" ${clickHandler}>
                                    <div class="flex items-center gap-2 truncate">
                                        <div class="w-2 h-2 rounded-full" style="background-color: ${palette[i % palette.length]}"></div>
                                        <span class="font-medium truncate ${filterType ? 'group-hover:text-primary transition-colors' : ''}">${label}</span>
                                    </div>
                                    <span class="font-bold text-primary">${count}</span>
                                </div>
                            `;}).join('')}
                            ${entries.length === 0 ? '<p class="text-xs text-slate-400 italic">No data available.</p>' : ''}
                        </div>
                    </div>
                `;
            }

            function renderMyBooksStats(finishedBooks) {
                const genresCount = {};
                finishedBooks.forEach(b => {
                    getBookGenres(b).forEach(g => {
                        genresCount[g] = (genresCount[g] || 0) + 1;
                    });
                });

                const genreEntries = Object.entries(genresCount).sort((a, b) => b[1] - a[1]);
                const total = finishedBooks.length;
                const colors = ['#3b82f6', '#10b981', '#f59e0b', '#f43f5e', '#8b5cf6', '#06b6d4', '#ec4899', '#f97316'];

                return `
                <div class="glass p-8 rounded-[2.5rem] border border-blue-100/50 dark:border-slate-800">
                    <div class="flex flex-col md:flex-row items-center gap-12">

            function renderLibraryInsight() {
                const authorsCount = {};
                const ownersCount = {};
                const genresCount = {};
                const tagsCount = {};
                let totalValue = 0;
                let totalTags = 0;
                const statusCounts = { finished: 0, reading: 0, want_to_read: 0 };
                const ratingDist = { 5: 0, 4: 0, 3: 0, 2: 0, 1: 0 };

                const libBooks = books.filter(b => !getStatusData(b.id).isWishlist && !b.excludeFromLibrary);

                libBooks.forEach(b => {
                    const statusData = getStatusData(b.id);
                    const status = statusData.status;

                    const author = b.author || 'Unknown';
                    authorsCount[author] = (authorsCount[author] || 0) + 1;

                    const owner = b.owner || 'Unknown';
                    ownersCount[owner] = (ownersCount[owner] || 0) + 1;

                    getBookGenres(b).forEach(g => {
                        genresCount[g] = (genresCount[g] || 0) + 1;
                    });

                    (b.tags || []).forEach(t => {
                        tagsCount[t] = (tagsCount[t] || 0) + 1;
                        totalTags++;
                    });

                    totalValue += (parseFloat(b.price) || 0);

                    const rating = statusData.rating || 0;
                    if (rating >= 1 && rating <= 5) ratingDist[rating]++;

                    if (statusCounts.hasOwnProperty(status)) statusCounts[status]++;
                });

                const avgPrice = libBooks.length > 0 ? (totalValue / libBooks.length).toFixed(2) : 0;
                const avgTags = libBooks.length > 0 ? (totalTags / libBooks.length).toFixed(1) : 0;

                return `
                <div class="max-w-4xl mx-auto space-y-12 animate-slide-up">
                    <div class="glass p-8 rounded-[2.5rem] border border-blue-100/50 dark:border-slate-800">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">

                            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-100 dark:bg-slate-800 px-4 py-2 rounded-full">Updated ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                        </div>

                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4 mb-10">
                            <div class="bg-primary p-3 sm:p-6 rounded-3xl text-white shadow-lg shadow-primary/20 dark:shadow-none relative overflow-hidden group">
                                <div class="absolute -right-2 -bottom-2 opacity-10 group-hover:scale-110 transition-transform duration-500">
                                    <svg class="w-16 h-16 sm:w-20 sm:h-20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/><path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
                                </div>
                                <div class="text-[10px] font-bold uppercase opacity-80 mb-1">Total Books</div>
                                <div class="text-xl sm:text-4xl font-black font-sans relative z-10">${libBooks.length}</div>
                            </div>
