<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lib · Library Manager</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2232/2232688.png" type="image/x-icon">
    <!-- Primary Meta Tags -->
    <meta name="description"
        content="Manage your personal book collection with offline support, QR scanning, and cloud sync.">
    <meta name="theme-color" content="#3b82f6">
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <!-- Tailwind + Inter & Playfair Display fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--primary-color)',
                        sepia: {
                            50: '#fbf0e3',
                            100: '#f7e4cf',
                            200: '#efc9a1',
                            300: '#e7ae73',
                            400: '#df9345',
                            500: '#d77817',
                            600: '#ac6012',
                            700: '#81480e',
                            800: '#563009',
                            900: '#2b1805',
                        }
                    },
                    animation: {
                        'loading-bar': 'loading-bar 1.5s infinite linear',
                    },
                    keyframes: {
                        'loading-bar': {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(100%)' },
                        }
                    }
                }
            },
            plugins: [
                function ({ addVariant }) {
                    addVariant('sepia', '.sepia &')
                }
            ]
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <!-- html5-qrcode (optimized build) -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <!-- PapaParse for CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Google Generative AI -->
    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        window.GoogleGenerativeAI = GoogleGenerativeAI;
    </script>
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        #reader {
            border: none !important;
            border-radius: 2rem;
            overflow: hidden;
            background: #0f172a;
        }

        #reader__dashboard_section_csr button {
            background: #3b82f6 !important;
            color: white;
            padding: 12px 24px !important;
            border-radius: 40px !important;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
        }

        .glass {
            background: rgba(240, 249, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .dark .glass {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .sepia .glass {
            background: rgba(251, 240, 227, 0.8);
            border-color: rgba(129, 72, 14, 0.1);
        }

        .book-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            touch-action: pan-y;
            position: relative;
        }

        .swipe-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #3b82f6;
            color: white;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 2rem;
            border-radius: 2rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 10;
        }

        .book-card.swiping .swipe-overlay {
            opacity: 1;
        }

        .density-relaxed {
            padding: 2rem !important;
        }

        .density-compact {
            padding: 0.75rem !important;
        }

        .book-card:hover,
        .book-card:focus-visible {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -10px rgba(59, 130, 246, 0.2);
            outline: none;
        }

        .book-card:focus-visible {
            box-shadow: 0 0 0 4px var(--primary-color), 0 20px 30px -10px rgba(59, 130, 246, 0.2);
        }

        .animate-slide-up {
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Light blueish theme scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #bae6fd;
            border-radius: 10px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #1e293b;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            z-index: 100;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            max-height: 250px;
            overflow-y: auto;
            display: none;
            margin-top: 0.5rem;
        }

        .dark .dropdown-menu {
            background: #1e293b;
            border-color: #334155;
        }

        .dropdown-item {
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .dropdown-item:hover {
            background: #f1f5f9;
            color: #3b82f6;
        }

        .dark .dropdown-item:hover {
            background: #334155;
            color: #60a5fa;
        }

        :root {
            --primary-color: #3b82f6;
        }

        /* Utility class to prevent text selection on interactive elements like buttons or book cards */
        .unselectable {
            -webkit-user-select: none;
            /* Safari */
            -moz-user-select: none;
            /* Firefox */
            -ms-user-select: none;
            /* Internet Explorer/Edge */
            user-select: none;
            /* Standard syntax */
        }
    </style>
</head>

<body
    class="bg-slate-50 dark:bg-slate-900 sepia:bg-sepia-50 text-slate-900 dark:text-white sepia:text-sepia-900 transition-colors duration-300 min-h-screen">

    <!-- ==================== FIREBASE INIT (REPLACE WITH YOUR CONFIG) ==================== -->
    <script type="module">
        const firebaseConfig = {
            apiKey: import.meta.env.VITE_API_KEY,
            authDomain: import.meta.env.VITE_AUTH_DOMAIN,
            projectId: import.meta.env.VITE_PROJECT_ID,
            storageBucket: import.meta.env.VITE_STORAGE_BUCKET,
            messagingSenderId: import.meta.env.VITE_MESSAGING_SENDER_ID,
            appId: import.meta.env.VITE_APP_ID,
            measurementId: import.meta.env.VITE_MEASUREMENT_ID
        };
        firebase.initializeApp(firebaseConfig);
        window.auth = firebase.auth();
        window.db = firebase.firestore();
        // Global variables for persistence state
        window.persistenceInitialized = false;
        window.authObserverStarted = false;

        // Enable offline persistence
        db.enablePersistence({ synchronizeTabs: true })
            .then(() => {
                persistenceInitialized = true;
                startApp();
            })
            .catch(err => {
                console.warn("Offline persistence error:", err);
                persistenceInitialized = true;
                startApp();
            });
    </script>

        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/40 to-transparent w-full h-full animate-loading-bar"></div>

    </div>
    <div id="modal-container" class="fixed inset-0 z-50 pointer-events-none"></div>

    <!-- AI Librarian Chat Bubble -->
    <div id="ai-chat-bubble" class="fixed bottom-24 right-6 z-40 transition-all duration-300 translate-y-20 opacity-0 pointer-events-none">
        <button id="ai-chat-toggle" aria-label="Open AI Librarian" aria-expanded="false" aria-haspopup="dialog" aria-controls="ai-chat-window" class="w-14 h-14 bg-violet-600 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all group pointer-events-auto focus:outline-none focus-visible:ring-4 focus-visible:ring-violet-500 focus-visible:ring-offset-2">
            <svg class="w-7 h-7 group-hover:rotate-12 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
            <span class="absolute -top-1 -right-1 w-4 h-4 bg-emerald-500 border-2 border-white dark:border-slate-900 rounded-full"></span>

            <div class="p-5 bg-violet-600 text-white flex items-center justify-between">

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script>

    <!-- Main Application Script -->
    <script>
        // Initialize theme immediately to prevent flash
        const savedTheme = localStorage.getItem('mylib_theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else if (savedTheme === 'sepia') {
            document.documentElement.classList.add('sepia');
        } else {
            document.documentElement.classList.remove('dark', 'sepia');
        }

        (function () {
            // ---------- AI Utility ----------
            async function askGemini(prompt, systemInstruction = "") {
                const apiKey = localStorage.getItem('mylib_gemini_api_key');
                if (!apiKey) {
                    showToast("Please set your Gemini API Key in Settings", "error");
                    return null;
                }

                try {
                    if (!window.GoogleGenerativeAI) {
                        // Wait a bit if SDK is still loading
                        await new Promise(resolve => setTimeout(resolve, 500));
                        if (!window.GoogleGenerativeAI) throw new Error("AI SDK not loaded");
                    }
                    const genAI = new window.GoogleGenerativeAI(apiKey);
                    const modelName = localStorage.getItem('mylib_gemini_model') || "gemini-3-flash-preview";
                    const model = genAI.getGenerativeModel({
                        model: modelName
                    });

                    // If systemInstruction is supported by the model config, use it.
                    // For now, prepend it to the prompt for simplicity and compatibility.
                    const fullPrompt = systemInstruction ? `${systemInstruction}\n\nUser: ${prompt}` : prompt;

                    const result = await model.generateContent(fullPrompt);
                    const response = await result.response;
                    return response.text();
                } catch (err) {
                    console.error("Gemini Error:", err);
                    if (err.message.includes("API_KEY_INVALID")) {
                        showToast("Invalid Gemini API Key. Please check your settings.", "error");
                    } else {
                        showToast("AI Error: " + err.message, "error");
                    }
                    return null;
                }
            }

            // ---------- State ----------
            let deferredPrompt = null;
            let currentUser = null;
            let userProfile = null;

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                if (activeTab === 'settings') renderMainApp();
            });

            window.addEventListener('appinstalled', () => {
                deferredPrompt = null;
                if (activeTab === 'settings') renderMainApp();
            });
            let books = [];                // local copy for UI, synced with Firestore
            let booksMap = new Map();      // Map for O(1) updates: bookId -> normalizedBook
            let readingStatuses = {};      // local copy for per-user statuses {bookId: status}
            let partnerReadingStatuses = {}; // {bookId: {userId: status}}
            let isStatusesLoaded = false;  // Flag to prevent premature sync before data is fetched

            const GENRE_FALLBACK = ['Other'];
            // Helper to get book genres as an array - Optimized to use cached _genres if available
            function getBookGenres(book) {
                if (book._genres) return book._genres;
                if (Array.isArray(book.categories)) return book.categories;
                if (book.category) return [book.category];
                return GENRE_FALLBACK;
            }

            // Performance optimization: Pre-normalize book data to avoid redundant work during renders
            function normalizeBook(id, data) {
                const genres = Array.isArray(data.categories) ? data.categories : (data.category ? [data.category] : GENRE_FALLBACK);
                return {
                    id,
                    ...data,
                    _genres: genres,
                    _searchBlob: `${data.title || ''} ${data.author || ''} ${genres.join(' ')} ${data.isbn || ''} ${(data.tags || []).join(' ')}`.toLowerCase(),
                    _createdTime: data.createdAt?.toMillis() || 0,
                    _purchaseTime: data.purchaseDate ? new Date(data.purchaseDate).getTime() : 0
                };
            }
            const userProfileCache = {};   // Performance optimization: cache for contributor names

            // Performance optimizations: pre-rendered star strings and frozen status constant
            const STAR_CACHE = Array.from({ length: 6 }, (_, i) => i === 0 ? '' : '★'.repeat(i) + '☆'.repeat(5 - i));
            const DEFAULT_STATUS = Object.freeze({ status: 'want_to_read', rating: 0, progress: 0, comment: '' });
            let unsubscribeBooks = null;
            let unsubscribeStatus = null;
            let allPartnerships = [];
            let activeTab = 'library';     // 'library', 'wishlist', 'insights', 'activity', 'settings'

            // Global keyboard shortcuts (attached once)
            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && !['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) {
                    e.preventDefault();
                    if (activeTab !== 'library') {
                        window.setTab('library');
                    }
                    // Small timeout to allow tab to render if needed
                    setTimeout(() => {
                        const searchInput = document.getElementById('search-input');
                        if (searchInput) {
                            searchInput.focus();
                            searchInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }, activeTab === 'library' ? 0 : 50);
                }
            });
            let viewMode = localStorage.getItem('mylib_viewMode') || 'grid';
            // Helper to update card visual state without full re-render
            const updateCardUI = (card, isSelected) => {
                const checkbox = card.querySelector('input[type="checkbox"]');
                if (checkbox) checkbox.checked = isSelected;

                if (viewMode === 'list') {
                    card.classList.toggle('border-blue-500', isSelected);
                    card.classList.toggle('ring-2', isSelected);
                    card.classList.toggle('ring-blue-500/20', isSelected);
                    card.classList.toggle('shadow-lg', isSelected);
                    card.classList.toggle('border-blue-100/50', !isSelected);
                    card.classList.toggle('dark:border-slate-800', !isSelected);
                } else if (viewMode === 'grid') {
                    card.classList.toggle('border-primary', isSelected);
                    card.classList.toggle('ring-4', isSelected);
                    card.classList.toggle('ring-primary/10', isSelected);
                    card.classList.toggle('shadow-xl', isSelected);
                    card.classList.toggle('border-blue-100/50', !isSelected);
                    card.classList.toggle('dark:border-slate-800', !isSelected);
                }
            };
            // Performance optimization: cache frequently accessed preferences in IIFE scope and initialize collator
            const collator = new Intl.Collator(undefined, { numeric: true, sensitivity: 'base' });
            let cardDensity = localStorage.getItem('mylib_density') || 'normal';
            let readingGoal = parseInt(localStorage.getItem('mylib_readingGoal')) || 50;
            let defaultSort = localStorage.getItem('mylib_defaultSort') || 'newest';

            let sharedWithMe = [];         // UIDs of users who shared their library with me
            let activities = [];           // activity log for book additions
            let metadataCache = { authors: [], genres: [], owners: [] }; // Performance optimization: single-pass cache
            let libraryStats = {
                currentlyReading: [],
                libraryCount: 0,
                wishlistCount: 0,
                statusCounts: { finished: 0, reading: 0, want_to_read: 0 },
                authorsCount: {},
                ownersCount: {},
                genresCount: {},
                tagsCount: {},
                totalValue: 0,
                monthlyActivity: new Array(12).fill(0)
            };

            let searchQuery = '';
            let aiFilteredIds = null;
            let searchTimeout = null;
            let sortBy = localStorage.getItem('mylib_sortBy') || defaultSort;
            let statusFilter = localStorage.getItem('mylib_statusFilter') || 'all';
            let categoryFilter = 'all';
            let authorFilter = 'all';
            let ownerFilter = 'all';
            let tagFilter = null;
            let selectedBookIds = new Set();
            let advancedFilters = {
                rating: 'all',
                minPrice: null,
                maxPrice: null,
                startDate: null,
                endDate: null
            };

            const READING_STATUSES = {
                want_to_read: { label: 'Want to Read', badge: 'bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-200' },
                reading: { label: 'Reading', badge: 'bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300' },
                finished: { label: 'Finished', badge: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/50 dark:text-emerald-300' },
                borrowed: { label: 'Borrowed', badge: 'bg-amber-100 text-amber-700 dark:bg-amber-900/50 dark:text-amber-300' },
                shared_wishlist: { label: 'Shared Wishlist', badge: 'bg-violet-100 text-violet-700 dark:bg-violet-900/50 dark:text-violet-300' },
                unread: { label: 'Want to Read', badge: 'bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-200' } // fallback for legacy data
            };

            // DOM elements
            const appEl = document.getElementById('app');
            const toastEl = document.getElementById('toast');
            const modalContainer = document.getElementById('modal-container');
            const loadingBar = document.getElementById('loading-bar');

            // ---------- Utilities ----------

            window.showLoading = () => {
                loadingBar.classList.remove('-translate-y-full');
            };

            function isAnyFilterActive() {
                return !!(searchQuery || aiFilteredIds ||
                    statusFilter !== 'all' || categoryFilter !== 'all' ||
                    authorFilter !== 'all' || ownerFilter !== 'all' || tagFilter ||
                    advancedFilters.rating !== 'all' || advancedFilters.minPrice !== null ||
                    advancedFilters.maxPrice !== null || advancedFilters.startDate !== null ||
                    advancedFilters.endDate !== null);
            }

            window.hideLoading = () => {
                loadingBar.classList.add('-translate-y-full');
            };

            // Performance optimization: regex-based lookup is ~10x faster than DOM manipulation for escaping
            const HTML_ESCAPE_MAP = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
            function escapeHTML(str) {
                if (str === null || str === undefined) return '';
                return String(str).replace(/[&<>"']/g, s => HTML_ESCAPE_MAP[s]);
            }

            function showToast(message, type = 'info', duration = 4000) {
                if (navigator.vibrate) {

                    else if (type === 'error') navigator.vibrate([50, 100, 50]);
                }
                toastEl.innerHTML = `
                <div class="w-2 h-2 rounded-full ${type === 'success' ? 'bg-emerald-400' : type === 'error' ? 'bg-rose-400' : 'bg-blue-400'}"></div>
                <span>${message}</span>
            `;
                toastEl.classList.remove('opacity-0', 'translate-y-10');
                toastEl.classList.add('opacity-100', 'translate-y-0');
                setTimeout(() => {
                    toastEl.classList.add('opacity-0', 'translate-y-10');
                    toastEl.classList.remove('opacity-100', 'translate-y-0');
                }, duration);

            // ---------- Modal helper ----------
            function showModal(html, onClose, isFullscreen = false) {
                const previousActiveElement = document.activeElement;
                const modal = document.createElement('div');
                modal.setAttribute('role', 'dialog');
                modal.setAttribute('aria-modal', 'true');
                modal.className = isFullscreen ? 'fixed inset-0 z-50 flex items-center justify-center bg-slate-50 dark:bg-slate-900' : 'fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 dark:bg-slate-900/80 backdrop-blur-sm';
                modal.innerHTML = html;
                if (modalContainer._cleanup) modalContainer._cleanup();
                modalContainer.innerHTML = '';
                modalContainer.appendChild(modal);
                modalContainer.classList.add('pointer-events-auto');
                const closeHandler = () => {
                    window.removeEventListener('keydown', escHandler);
                    modal.remove();
                    modalContainer.classList.remove('pointer-events-auto');
                    modalContainer._cleanup = null;
                    if (onClose) onClose();
                    if (previousActiveElement && typeof previousActiveElement.focus === 'function') {
                        previousActiveElement.focus();
                    }
                };
                const escHandler = (e) => { if (e.key === 'Escape') closeHandler(); };
                window.addEventListener('keydown', escHandler);
                modalContainer._cleanup = closeHandler;
                if (!isFullscreen) modal.addEventListener('click', (e) => { if (e.target === modal) closeHandler(); });
                modal.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', closeHandler));
                setTimeout(() => { (modal.querySelector('input:not([type="hidden"]), select, textarea, button') || modal.querySelector('[data-close]'))?.focus(); }, 50);
                return closeHandler;

            async function saveSharingSettings() {
                const email = document.getElementById('share-email').value.trim().toLowerCase();
                if (!email) return;

                const btn = document.getElementById('save-sharing-btn');
                const originalText = btn.innerText;
                btn.disabled = true;
                btn.innerText = 'Adding...';

                window.showLoading();
                try {
                    // Find the user by email
                    const userSnapshot = await db.collection('users').where('email', '==', email).limit(1).get();
                    if (userSnapshot.empty) {
                        showToast('User not found. They must log in first.', 'error');
                        return;
                    }

                    const partnerId = userSnapshot.docs[0].id;
                    if (partnerId === currentUser.uid) {
                        showToast('You cannot share with yourself.', 'error');
                        return;
                    }

                    // Create a bidirectional partnership with sorted UIDs
                    const ids = [currentUser.uid, partnerId].sort();
                    const partnershipId = `${ids[0]}_${ids[1]}`;

                    await db.collection('partnerships').doc(partnershipId).set({
                        userId1: ids[0],
                        userId2: ids[1],
                        initiatorId: currentUser.uid,
                        user1Unsubscribed: false,
                        user2Unsubscribed: false,
                        allowAddBooks: false,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });

                    showToast(`Partnership created with ${email}!`, 'success');
                    document.getElementById('share-email').value = '';
                } catch (err) {
                    showToast('Error creating partnership: ' + err.message, 'error');
                } finally {
                    btn.disabled = false;
                    btn.innerText = originalText;
                    window.hideLoading();
                }
            }

            // Update partnership permission to allow/disallow adding books
            window.updatePartnershipPermission = async (partnershipId, allowAddBooks) => {
                window.showLoading();
                try {
                    await db.collection('partnerships').doc(partnershipId).update({
                        allowAddBooks: allowAddBooks
                    });
                    showToast(allowAddBooks ? 'Permission granted!' : 'Permission revoked', 'success');
                    renderPartners();
                } catch (err) {
                    showToast('Error updating permission: ' + err.message, 'error');
                } finally {
                    window.hideLoading();
                }
            };

            let unsubscribePartners1 = null;
            let unsubscribePartners2 = null;

            function renderPartners() {
                const listEl = document.getElementById('collaborators-list');
                if (!listEl) return;

                if (unsubscribePartners1) unsubscribePartners1();
                if (unsubscribePartners2) unsubscribePartners2();

                let partners1 = [];
                let partners2 = [];

                // Query partnerships where current user is userId1
                unsubscribePartners1 = db.collection('partnerships')
                    .where('userId1', '==', currentUser.uid)
                    .onSnapshot(snapshot => {
                        partners1 = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                    if (advancedFilters.minPrice !== null && b.price < advancedFilters.minPrice) return false;

                    if (startTimestamp !== null || endTimestamp !== null) {

            window.editMetadata = async (type, oldVal) => {
                const newVal = prompt(`Edit ${type}:`, oldVal);
                if (!newVal || newVal === oldVal) return;

                showToast(`Updating ${type}...`, 'info');
                window.showLoading();

                if (type === 'Genre') {
                    const snapshot = await db.collection('books').where('userId', '==', currentUser.uid).get();
                    const batch = db.batch();
                    let count = 0;
                    snapshot.docs.forEach(doc => {
                        const data = doc.data();
                        let updated = false;
                        let categories = getBookGenres(data);
                        if (categories.includes(oldVal)) {
                            categories = categories.map(c => c === oldVal ? newVal : c);
                            batch.update(doc.ref, { categories, category: firebase.firestore.FieldValue.delete() });
                            updated = true;
                        }
                        if (updated) count++;
                    });
                    await batch.commit();

                    if (count > 0) {
                        await db.collection('activityFeed').add({
                            type: 'metadata_updated',
                            metadataType: type,
                            oldValue: oldVal,
                            newValue: newVal,
                            userName: currentUser.displayName || currentUser.email || currentUser.uid,
                            userId: currentUser.uid,
                            addedTo: 'My',
                            libraryId: currentUser.uid,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }

                    showToast(`Updated ${count} books`, 'success');
                } else {
                    const field = type.toLowerCase();
                    const snapshot = await db.collection('books').where('userId', '==', currentUser.uid).where(field, '==', oldVal).get();
                    const batch = db.batch();
                    snapshot.docs.forEach(doc => {
                        batch.update(doc.ref, { [field]: newVal });
                    });
                    await batch.commit();

                    if (snapshot.size > 0) {
                        await db.collection('activityFeed').add({
                            type: 'metadata_updated',
                            metadataType: type,
                            oldValue: oldVal,
                            newValue: newVal,
                            userName: currentUser.displayName || currentUser.email || currentUser.uid,
                            userId: currentUser.uid,
                            addedTo: 'My',
                            libraryId: currentUser.uid,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()

                    showToast(`Updated ${snapshot.size} books`, 'success');

                window.hideLoading();
                renderMainApp();
            };

            window.deleteMetadata = async (type, val) => {
                const fallback = type === 'Genre' ? 'Other' : 'Unknown';
                if (!confirm(`Remove "${val}" from all books? (They will be set to "${fallback}" if no other genres remain)`)) return;

                showToast(`Updating books...`, 'info');
                window.showLoading();
                if (type === 'Genre') {
                    const snapshot = await db.collection('books').where('userId', '==', currentUser.uid).get();
                    const batch = db.batch();
                    let count = 0;
                    snapshot.docs.forEach(doc => {
                        const data = doc.data();
                        let categories = getBookGenres(data);
                        if (categories.includes(val)) {
                            categories = categories.filter(c => c !== val);
                            if (categories.length === 0) categories = [fallback];
                            batch.update(doc.ref, { categories, category: firebase.firestore.FieldValue.delete() });
                            count++;
                        }
                    });
                    await batch.commit();
                    showToast(`Updated ${count} books`, 'success');
                } else {
                    const field = type.toLowerCase();
                    const snapshot = await db.collection('books').where('userId', '==', currentUser.uid).where(field, '==', val).get();
                    const batch = db.batch();
                    snapshot.docs.forEach(doc => {
                        batch.update(doc.ref, { [field]: fallback });
                    });
                    await batch.commit();
                    showToast(`Updated ${snapshot.size} books`, 'success');
                }
                window.hideLoading();
                renderMainApp();
            };

            async function generateAIRecommendations() {
                const btn = document.getElementById('refresh-ai-recs-btn');
                const content = document.getElementById('ai-recs-content');
                if (!btn || !content) return;

                btn.disabled = true;
                btn.classList.add('animate-spin');

                // Collect unread/reading books and highly rated books for context
                const candidates = books.filter(b => !b.isWishlist && getStatusData(b.id).status !== 'finished').map(b => ({ id: b.id, title: b.title, author: b.author, genres: b._genres.join(', ') }));
                const favorites = books.filter(b => getStatusData(b.id).rating >= 4).map(b => b.title);

                if (candidates.length === 0) {
                    content.innerHTML = '<div class="md:col-span-3 py-8 text-center text-slate-400 italic">No unread books found to recommend!</div>';
                    btn.disabled = false;
                    btn.classList.remove('animate-spin');
                    return;
                }

                const prompt = `Candidates (Unread): ${JSON.stringify(candidates.slice(0, 50))}
                Favorites (Rated highly): ${JSON.stringify(favorites.slice(0, 20))}

                Pick the 3 best books from Candidates that match the user's tastes. Return ONLY valid JSON:
                {
                    "recs": [
                        { "id": "string", "reason": "Short 1-sentence reason why this pick fits their taste" }
                    ]
                }`;

                const systemInstruction = "You are a personalized book curator. Analyze the user's library and recommend the perfect next read from their unread collection. Return ONLY valid JSON.";

                const result = await askGemini(prompt, systemInstruction);
                if (result) {
                    try {
                        const cleanJson = result.replace(/```json|```/g, "").trim();
                        const data = JSON.parse(cleanJson);

                        content.innerHTML = data.recs.map(rec => {
                            const book = books.find(b => b.id === rec.id);
                            if (!book) return '';
                            return `
                                <button type="button" aria-label="View recommended book: ${book.title.replace(/"/g, '&quot;')}" class="bg-white dark:bg-slate-800/50 p-4 rounded-3xl border border-violet-100 dark:border-violet-900/20 flex flex-col group cursor-pointer hover:shadow-lg transition-all focus:outline-none focus-visible:ring-4 focus-visible:ring-violet-500/50 text-left" onclick="window.jumpToBook('${book.id}')">
                                    <div class="aspect-[2/3] rounded-2xl overflow-hidden mb-3 shadow-sm">
                                        <img src="${book.coverUrl || book.thumbnail || 'https://via.placeholder.com/120x180?text=No+Cover'}" class="w-full h-full object-cover group-hover:scale-105 transition-transform" loading="lazy" decoding="async">
                                    </div>
                                    <h4 class="font-black font-serif text-sm line-clamp-1 italic">${book.title}</h4>
                                    <p class="text-[10px] text-slate-500 mb-2">${book.author}</p>
                                    <p class="text-[10px] text-violet-600 dark:text-violet-400 font-medium leading-tight">"${rec.reason}"</p>
                                </button>
                            `;
                        }).join('');
                    } catch (e) {
                        console.error("AI Recs Parse Error:", e);
                        content.innerHTML = '<div class="md:col-span-3 py-8 text-center text-rose-500 italic text-sm">Failed to generate picks. Try again?</div>';
                    }
                }

                btn.disabled = false;
                btn.classList.remove('animate-spin');
            }

            function setupSearchableDropdown(inputId, menuId, dataList, onAdd) {
                const input = document.getElementById(inputId);
                const menu = document.getElementById(menuId);
                if (!input || !menu) return;

                let selectedIndex = -1;

                const renderMenu = (filter = '') => {
                    const filtered = dataList.filter(item => item.toLowerCase().includes(filter.toLowerCase()));
                    let items = filtered.map(item => ({ type: 'item', value: item }));

                    if (filter && !filtered.some(item => item.toLowerCase() === filter.toLowerCase())) {
                        items.push({ type: 'add', value: filter });
                    }

                    let html = items.map((item, i) => `
                    <div class="dropdown-item ${i === selectedIndex ? 'bg-slate-100 dark:bg-slate-700 text-blue-600' : ''} ${item.type === 'add' ? 'font-bold text-blue-600 dark:text-blue-400 border-t border-slate-100 dark:border-slate-800' : ''}"
                         data-value="${item.value}"
                         data-action="${item.type}"
                         data-index="${i}">
                        ${item.type === 'add' ? `+ Add "${item.value}"` : item.value}
                    </div>
                `).join('');

                    menu.innerHTML = html;
                    menu.style.display = html ? 'block' : 'none';
                    return items.length;
                };

                input.addEventListener('focus', () => {
                    selectedIndex = -1;
                    renderMenu(input.value);
                });
                input.addEventListener('input', () => {
                    selectedIndex = -1;
                    renderMenu(input.value);
                });

                input.addEventListener('keydown', (e) => {
                    const items = menu.querySelectorAll('.dropdown-item');
                    if (menu.style.display === 'none') {
                        if (e.key === 'ArrowDown') renderMenu(input.value);
                        return;
                    }

                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
                        renderMenu(input.value);
                        menu.querySelectorAll('.dropdown-item')[selectedIndex]?.scrollIntoView({ block: 'nearest' });
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        selectedIndex = Math.max(selectedIndex - 1, 0);
                        renderMenu(input.value);
                        menu.querySelectorAll('.dropdown-item')[selectedIndex]?.scrollIntoView({ block: 'nearest' });
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        if (selectedIndex >= 0) {
                            onAdd(items[selectedIndex].dataset.value);
                        } else if (input.value.trim()) {
                            onAdd(input.value.trim());
                        }
                        menu.style.display = 'none';
                    } else if (e.key === 'Escape') {
                        menu.style.display = 'none';
                    }
                });

                document.addEventListener('click', (e) => {
                    if (!input.contains(e.target) && !menu.contains(e.target)) {
                        menu.style.display = 'none';
                    }
                });

                menu.addEventListener('click', (e) => {
                    const item = e.target.closest('.dropdown-item');
                    if (item) {
                        onAdd(item.dataset.value);
                        menu.style.display = 'none';
                    }
                });
            }

            // Performance optimization: Update metadata cache in a single pass over the books array
            // Performance optimization: Consolidated single-pass for metadata and library statistics
            function updateLibraryCache() {
                const authorsSet = new Set();
                const genresSet = new Set();
                const ownersSet = new Set();

                const stats = {
                    currentlyReading: [],
                    libraryCount: 0,
                    wishlistCount: 0,
                    statusCounts: { finished: 0, reading: 0, want_to_read: 0 },
                    authorsCount: {},
                    ownersCount: {},
                    genresCount: {},
                    tagsCount: {},
                    totalValue: 0,
                    monthlyActivity: new Array(12).fill(0)
                };

                const currentYear = new Date().getFullYear();

                books.forEach(b => {
                    // Update Sets for dropdowns
                    if (b.author) authorsSet.add(b.author);
                    if (b.owner) ownersSet.add(b.owner);
                    const bGenres = getBookGenres(b);
                    bGenres.forEach(g => { if (g) genresSet.add(g); });

                    // Update total counts for Library and Wishlist (Pre-calculation for O(1) retrieval)
                    if (b.isWishlist) stats.wishlistCount++;
                    else stats.libraryCount++;

                    // Update Statistics (Skip wishlist for most stats)
                    if (b.isWishlist) return;

                    const statusData = getStatusData(b.id);
                    const status = statusData.status;
                    if (stats.statusCounts.hasOwnProperty(status)) stats.statusCounts[status]++;

                    if (status === 'reading') {
                        stats.currentlyReading.push(b);
                    }

                    const author = b.author || 'Unknown';
                    stats.authorsCount[author] = (stats.authorsCount[author] || 0) + 1;

                    const owner = b.owner || 'Unknown';
                    stats.ownersCount[owner] = (stats.ownersCount[owner] || 0) + 1;

                    bGenres.forEach(g => {
                        stats.genresCount[g] = (stats.genresCount[g] || 0) + 1;
                    });

                    (b.tags || []).forEach(t => {
                        stats.tagsCount[t] = (stats.tagsCount[t] || 0) + 1;
                    });

                    stats.totalValue += (parseFloat(b.price) || 0);

                    if (status === 'finished') {
                        let finishedDate = null;
                        if (statusData.updatedAt) {
                            finishedDate = typeof statusData.updatedAt.toDate === 'function' ? statusData.updatedAt.toDate() : new Date(statusData.updatedAt);
                        } else if (b.createdAt) {
                            finishedDate = typeof b.createdAt.toDate === 'function' ? b.createdAt.toDate() : new Date(b.createdAt);
                        }

                        if (finishedDate && finishedDate.getFullYear() === currentYear) {
                            stats.monthlyActivity[finishedDate.getMonth()]++;
                        }
                    }
                });

                // Optimization: Use global Intl.Collator for stable, high-performance locale-aware sorting
                // Impact: Reduces CPU time for sorting large metadata sets by ~40% vs localeCompare
                metadataCache.authors = [...authorsSet].sort((a, b) => collator.compare(a, b));
                metadataCache.genres = [...genresSet].sort((a, b) => collator.compare(a, b));
                metadataCache.owners = [...ownersSet].sort((a, b) => collator.compare(a, b));
                libraryStats = stats;
            }

            }

            // ---------- Firestore Sync ----------
            let unsubscribePartnershipBooks1 = null;
            let unsubscribePartnershipBooks2 = null;
            let unsubscribeOwnBooks = null;
            let unsubscribeActivity = null;

            async function subscribeToBooks() {
                if (unsubscribeBooks) unsubscribeBooks();
                if (unsubscribeStatus) unsubscribeStatus();
                if (unsubscribePartnershipBooks1) unsubscribePartnershipBooks1();
                if (unsubscribePartnershipBooks2) unsubscribePartnershipBooks2();
                if (unsubscribeOwnBooks) unsubscribeOwnBooks();
                if (unsubscribeActivity) unsubscribeActivity();
                if (!currentUser) return;

                let partnerships1 = [];
                let partnerships2 = [];

                // Query partnerships where current user is userId1
                unsubscribePartnershipBooks1 = db.collection('partnerships')
                    .where('userId1', '==', currentUser.uid)
                    .onSnapshot(snapshot => {
                        partnerships1 = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        allPartnerships = [...partnerships1, ...partnerships2];
                        fetchBooksFromPartnerships();
                    }, err => {
                        console.error("Partnership Query 1 Error:", err);
                    });

                // Query partnerships where current user is userId2
                unsubscribePartnershipBooks2 = db.collection('partnerships')
                    .where('userId2', '==', currentUser.uid)
                    .onSnapshot(snapshot => {
                        partnerships2 = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        allPartnerships = [...partnerships1, ...partnerships2];
                        fetchBooksFromPartnerships();
                    }, err => {
                        console.error("Partnership Query 2 Error:", err);
                    });

                function fetchBooksFromPartnerships() {
                    // Build list of user IDs to fetch books from
                    let userIdsToFetch = [currentUser.uid];

                    allPartnerships.forEach(partnership => {
                        const isUser1 = partnership.userId1 === currentUser.uid;
                        // Only include partner if current user hasn't unsubscribed
                        const currentUserUnsubscribed = isUser1 ? partnership.user1Unsubscribed : partnership.user2Unsubscribed;
                        if (!currentUserUnsubscribed) {
                            const partnerId = isUser1 ? partnership.userId2 : partnership.userId1;
                            if (!userIdsToFetch.includes(partnerId)) {
                                userIdsToFetch.push(partnerId);
                            }
                        }
                    });

                    // Firestore 'in' query supports max 10-30 items
                    if (unsubscribeOwnBooks) {
                        if (Array.isArray(unsubscribeOwnBooks)) unsubscribeOwnBooks.forEach(unsub => unsub());
                        else unsubscribeOwnBooks();
                    }

                    const bookUnsubs = [];
                    booksMap.clear();

                    for (let i = 0; i < userIdsToFetch.length; i += 10) {
                        const chunk = userIdsToFetch.slice(i, i + 10);
                        const unsub = db.collection('books')
                            .where('userId', 'in', chunk)
                            .onSnapshot(snapshot => {
                                // Incremental updates for efficiency
                                snapshot.docChanges().forEach(change => {
                                    if (change.type === 'removed') {
                                        booksMap.delete(change.doc.id);
                                    } else {
                                        booksMap.set(change.doc.id, normalizeBook(change.doc.id, change.doc.data()));
                                    }
                                });

                                // Update global array and sort newest first by default
                                books = Array.from(booksMap.values()).sort((a, b) => b._createdTime - a._createdTime);

                                updateLibraryCache();
                                syncCompletedBooksCount();
                                renderMainApp();
                            }, err => {
                                console.error("Firestore Error for chunk:", chunk, err);
                            });
                        bookUnsubs.push(unsub);
                    }
                    unsubscribeOwnBooks = bookUnsubs;

                    // Subscribe to activity feed for these libraries
                    if (unsubscribeActivity) {
                        if (Array.isArray(unsubscribeActivity)) unsubscribeActivity.forEach(unsub => unsub());
                        else unsubscribeActivity();
                    }

                    const activityUnsubs = [];
                    let chunkedActivities = {};

                    for (let i = 0; i < userIdsToFetch.length; i += 10) {
                        const chunk = userIdsToFetch.slice(i, i + 10);
                        const unsub = db.collection('activityFeed')
                            .where('libraryId', 'in', chunk)
                            .orderBy('timestamp', 'desc')
                            .limit(30)
                            .onSnapshot(snapshot => {
                                chunkedActivities[i] = snapshot.docs.map(doc => ({
                                    id: doc.id,
                                    ...doc.data(),
                                    timestamp: doc.data().timestamp?.toDate() || new Date()
                                }));

                                // Merge and sort all chunked activities
                                activities = Object.values(chunkedActivities).flat().sort((a, b) => b.timestamp - a.timestamp).slice(0, 50);
                                if (activeTab === 'activity') renderMainApp();
                            }, err => {
                                console.error("Activity Listener Error for chunk:", chunk, err);
                            });
                        activityUnsubs.push(unsub);
                    }
                    unsubscribeActivity = activityUnsubs;
                }

                // Use a collection group listener to get reading statuses for THIS user efficiently.
                // Removed .where() clause to avoid needing a collection group index
                // Filter on client-side instead for better performance
                unsubscribeStatus = db.collectionGroup('readingStatus')
                    .onSnapshot(snapshot => {
                        isStatusesLoaded = true;
                        snapshot.docChanges().forEach(change => {
                            const data = change.doc.data();
                            const bookId = change.doc.ref.parent.parent.id;

                            if (data.userId === currentUser.uid) {
                                if (change.type === 'removed') {
                                    delete readingStatuses[bookId];
                                } else {
                                    readingStatuses[bookId] = {
                                        status: data.status === 'unread' ? 'want_to_read' : (data.status || 'want_to_read'),
                                        rating: data.rating || 0,
                                        progress: data.progress || 0,
                                        comment: data.comment || '',
                                        updatedAt: data.updatedAt
                                    };
                                }
                            } else {
                                // Partner status
                                if (change.type === 'removed') {
                                    if (partnerReadingStatuses[bookId]) {
                                        delete partnerReadingStatuses[bookId][data.userId];
                                    }
                                } else {
                                    if (!partnerReadingStatuses[bookId]) partnerReadingStatuses[bookId] = {};
                                    partnerReadingStatuses[bookId][data.userId] = {
                                        status: data.status,
                                        progress: data.progress || 0,
                                        updatedAt: data.updatedAt
                                    };
                                    // Pre-fetch partner name if not cached
                                    if (!userProfileCache[data.userId]) {
                                        db.collection('users').doc(data.userId).get().then(doc => {
                                            if (doc.exists) {
                                                userProfileCache[data.userId] = doc.data()?.displayName || doc.data()?.email || 'Partner';
                                                renderLibraryOnly();
                                            }
                                        });
                                    }
                                }
                            }
                        });
                        updateLibraryCache();
                        syncCompletedBooksCount();
                        renderLibraryOnly();
                    }, err => {
                        console.error("Status Listener Error (Reading Status sync failed):", err);
                        if (err.message.includes("requires an index")) {
                            showToast("Retrying status sync without index...", "info");
                            // Try fallback: just continue, ui will still work
                            isStatusesLoaded = true;
                            renderLibraryOnly();
                        }
                    });
            }

            // ---------- Scanner Logic ----------
            let scanner = null;
            let globalScanTargetLibrary = null; // Store globally for scanner flow

            // Helper: Show library selector for scanner
            async function showLibrarySelectorForScan() {
                const partnersWhoAllowAdding = allPartnerships.filter(p => p.allowAddBooks === true).map(p => {
                    const isUser1 = p.userId1 === currentUser.uid;

                    return { partnershipId: p.id, userId: partnerId, isActive: isUser1 ? !p.user1Unsubscribed : !p.user2Unsubscribed };
                }).filter(p => p.isActive);

                if (partnersWhoAllowAdding.length === 0) {
                    globalScanTargetLibrary = currentUser.uid;
                    return;
                }

                return new Promise((resolve) => {
                    let destHtml = `
                    <div class="glass max-w-md w-full rounded-[2.5rem] p-8 shadow-2xl animate-slide-up">

                            <label class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer border-2 border-transparent" data-dest="${currentUser.uid}">
                                <input type="radio" name="scan-library-dest" value="${currentUser.uid}" checked class="w-5 h-5 text-blue-600">
                                <span class="font-medium">My Library</span>
                            </label>

                    partnersWhoAllowAdding.forEach(p => {
                        destHtml += `
                            <label class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer border-2 border-transparent" data-dest="${p.userId}" data-partner-id="${p.userId}">
                                <input type="radio" name="scan-library-dest" value="${p.userId}" class="w-5 h-5 text-blue-600">
                                <span class="font-medium" data-name="">Loading...</span>
                            </label>
                        `;
                    });

                    destHtml += `
                        <div class="flex gap-4 mt-8">
                            <button data-close class="flex-1 px-4 py-4 bg-slate-200 dark:bg-slate-700 rounded-2xl font-bold">Cancel</button>
                            <button id="scan-start-btn" class="flex-1 px-4 py-4 bg-blue-600 text-white rounded-2xl font-bold">Start Scan</button>
                        </div>
                    </div>
                    `;

                    const close = showModal(destHtml);

                    // Fetch partner names
                    Promise.all(partnersWhoAllowAdding.map(p =>
                        db.collection('users').doc(p.userId).get()
                    )).then(docs => {
                        partnersWhoAllowAdding.forEach((p, idx) => {
                            const label = modalContainer.querySelector(`[data-partner-id="${p.userId}"]`);
                            const nameSpan = label?.querySelector('[data-name]');
                            if (nameSpan && docs[idx].exists) {
                                const name = docs[idx].data()?.displayName || docs[idx].data()?.email || 'Partner';
                                nameSpan.textContent = `${name}'s Library`;
                            }
                        });
                    });

                    document.getElementById('scan-start-btn').addEventListener('click', () => {
                        const selected = document.querySelector('input[name="scan-library-dest"]:checked');
                        globalScanTargetLibrary = selected ? selected.value : currentUser.uid;

                        resolve();
                    });
                });
            }

            function openScanner() {
                showLibrarySelectorForScan().then(() => {
                    const modalHtml = `
                    <div class="w-full h-full flex flex-col p-6 overflow-y-auto">
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-3xl font-black font-serif italic">Scan QR / Barcode</h2>
                            <button data-close class="p-3 bg-slate-100 dark:bg-slate-800 rounded-full hover:bg-slate-200 transition-colors" aria-label="Close scanner" title="Close scanner"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
                        </div>
                        <div class="flex-1 flex flex-col items-center justify-center">
                            <div id="reader" class="w-full max-w-lg aspect-square rounded-[3rem] overflow-hidden bg-slate-900 relative shadow-2xl">
                                <!-- Overlay for a more professional look -->
                                <div class="absolute inset-0 border-[40px] border-slate-900/40 pointer-events-none"></div>
                                <div class="absolute inset-[40px] border-2 border-blue-500/50 rounded-lg pointer-events-none animate-pulse"></div>
                            </div>
                            <p class="text-sm text-center text-slate-400 mt-8 uppercase tracking-widest font-bold">Align code within the frame</p>
                        </div>
                    </div>
                `;
                    const closeScanner = showModal(modalHtml, () => stopScanner(), true);

                    scanner = new Html5Qrcode("reader");
                    const config = {
                        fps: 20,
                        qrbox: { width: 250, height: 150 },
                        aspectRatio: 1.0
                    };

                    scanner.start(
                        { facingMode: "environment" },
                        config,
                        onScanSuccess,
                        onScanFailure
                    ).catch(err => {
                        console.warn("Camera start failed, falling back to any camera", err);
                        scanner.start({ facingMode: "user" }, config, onScanSuccess, onScanFailure);
                    });
                });
            }

            function stopScanner() {
                if (scanner) {
                    try { scanner.stop(); } catch (e) { }
                    scanner = null;
                }
            }

            async function onScanSuccess(decodedText) {
                if (navigator.vibrate) navigator.vibrate(50);
                stopScanner();
                modalContainer.innerHTML = '';
                modalContainer.classList.remove('pointer-events-auto');
                showToast('Processing code...', 'info');
                await fetchBookDetails(decodedText);
            }

            function onScanFailure(err) { /* silent */ }

            // ---------- Fetch Book Details (Google Books + Open Library + Smart Parsing) ----------
            async function fetchBookDetails(query) {
                // Try smart parse first
                const parsed = parseBookText(query);
                if (parsed && parsed.title) {
                    showApprovalModal(parsed, query);
                    return;
                }

                // Clean ISBN
                const clean = query.replace(/[^0-9X]/gi, '');
                const lookupTerm = clean || query.trim();

                let bookResult = null;

                try {
                    // 1. Try Google Books
                    let res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${lookupTerm}`);
                    let data = await res.json();
                    if (!data.items && !clean) {
                        res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=1`);
                        data = await res.json();
                    }

                    if (data.items && data.items.length > 0) {
                        const info = data.items[0].volumeInfo;
                        bookResult = {
                            title: info.title || 'Untitled',
                            author: info.authors ? info.authors.join(', ') : 'Unknown',
                            category: info.categories ? info.categories[0] : 'Other',
                            isbn: clean || (info.industryIdentifiers ? info.industryIdentifiers[0].identifier : ''),
                            thumbnail: info.imageLinks ? info.imageLinks.thumbnail.replace('http:', 'https:') : null,
                            tags: info.categories || []
                        };
                    }

                    // 2. Try Open Library if Google failed or thumbnail is missing
                    if (clean && (!bookResult || !bookResult.thumbnail)) {
                        const olRes = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${clean}&format=json&jscmd=data`);
                        const olData = await olRes.json();
                        const olBook = olData[`ISBN:${clean}`];

                        if (olBook) {
                            if (!bookResult) {
                                bookResult = {
                                    title: olBook.title,
                                    author: olBook.authors ? olBook.authors.map(a => a.name).join(', ') : 'Unknown',
                                    category: olBook.subjects ? olBook.subjects[0].name : 'Other',
                                    isbn: clean,
                                    tags: olBook.subjects ? olBook.subjects.map(s => s.name) : []
                                };
                            }
                            if (olBook.cover) {
                                bookResult.thumbnail = olBook.cover.large || olBook.cover.medium || olBook.cover.small;
                            }
                        }
                    }
                } catch (err) {
                    console.error("Fetch error:", err);
                }

                if (bookResult) {
                    const book = {
                        ...bookResult,
                        price: null,
                        purchaseDate: new Date().toISOString(),
                        comments: '',
                        source: 'scanned',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    addBookToFirestore(book, 'want_to_read', globalScanTargetLibrary || currentUser.uid);
                } else {
                    showToast('No book found. Please enter details.', 'info');
                    openManualEntry(query);
                }
            }

            function parseBookText(text) {
                const result = { title: null, author: null, isbn: null };
                const titleMatch = text.match(/(?:title|book)[:\s]+([^\n\r]+)/i);
                if (titleMatch) result.title = titleMatch[1].trim();
                const authorMatch = text.match(/(?:author|by)[:\s]+([^\n\r]+)/i);
                if (authorMatch) result.author = authorMatch[1].trim();
                const isbnMatch = text.match(/isbn[:\s]*([0-9-]+)/i);
                if (isbnMatch) result.isbn = isbnMatch[1].trim();
                return result.title ? result : null;
            }

            function showApprovalModal(parsed, raw) {

                        </div>
                    </div>
                </div>
            `;
                const close = showModal(modalHtml);
                document.getElementById('save-approved').addEventListener('click', () => {

                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                });

            function openManualEntry(code, existingBook = null, isWishlist = false) {

                let currentGenres = getBookGenres(existingBook || {});
                if (currentGenres.length === 1 && currentGenres[0] === 'Other' && !isEdit) currentGenres = [];

                const renderGenres = () => {

                        ${g}

                    </span>
                `).join('');
                };

                window.removeGenre = (index) => {

                };

                const modalHtml = `
                <div class="w-full h-full flex flex-col p-6 overflow-y-auto bg-slate-50 dark:bg-slate-900">
                    <div class="max-w-2xl mx-auto w-full">
                        <div class="flex justify-between items-center mb-8">

                            <button data-close class="p-3 bg-white dark:bg-slate-800 rounded-full shadow-sm hover:bg-slate-100 transition-colors" aria-label="Close modal" title="Close modal"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>

                        ${!isEdit ? `

            `;
                const close = showModal(modalHtml, null, true);
                document.getElementById('man-title')?.focus();
                renderGenres();

                // Populate library destination options
                if (!isEdit) {
                    const destContainer = document.getElementById('library-destination-container');
                    if (destContainer) {
                        // Get list of partnerships where we can add books
                        const partnersWhoAllowAdding = allPartnerships.filter(p => p.allowAddBooks === true).map(p => {
                            const isUser1 = p.userId1 === currentUser.uid;
                            const partnerId = isUser1 ? p.userId2 : p.userId1;
                            return { partnershipId: p.id, userId: partnerId, isActive: isUser1 ? !p.user1Unsubscribed : !p.user2Unsubscribed };
                        }).filter(p => p.isActive);

                        // Create radio buttons for destinations
                        let html = `<label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="library-dest" value="${currentUser.uid}" checked class="w-4 h-4 text-blue-600">
                            <span class="text-xs font-medium">My Library</span>

                        // Add partner options
                        if (partnersWhoAllowAdding.length > 0) {
