                            <div class="col-span-full py-20 text-center">
                                <div class="bg-slate-100 dark:bg-slate-800 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <svg class="w-8 h-8 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                                </div>
                                <h3 class="text-lg font-black font-serif italic">No books in this section</h3>
                                <p class="text-slate-400 text-sm mt-1">Start by marking some books as ${myBooksSubTab === 'finished' ? 'finished' : 'wishlist item'}.</p>
                            </div>
                        `}
                    </div>
                </div>
                `;
            }

            function renderMyBooksStats(finishedBooks) {
                const genresCount = {};
                finishedBooks.forEach(b => {
                    getBookGenres(b).forEach(g => {
                        genresCount[g] = (genresCount[g] || 0) + 1;
                    });
                });

                const genreEntries = Object.entries(genresCount).sort((a, b) => b[1] - a[1]);
                const total = finishedBooks.length;

                const colors = ['#3b82f6', '#10b981', '#f59e0b', '#f43f5e', '#8b5cf6', '#06b6d4', '#ec4899', '#f97316'];

                let currentPercent = 0;
                const chartPaths = genreEntries.map(([genre, count], i) => {
                    const percent = (count / total) * 100;
                    const startAngle = (currentPercent / 100) * 360;
                    currentPercent += percent;
                    const endAngle = (currentPercent / 100) * 360;

                    const x1 = 50 + 40 * Math.cos((Math.PI * (startAngle - 90)) / 180);
                    const y1 = 50 + 40 * Math.sin((Math.PI * (startAngle - 90)) / 180);
                    const x2 = 50 + 40 * Math.cos((Math.PI * (endAngle - 90)) / 180);
                    const y2 = 50 + 40 * Math.sin((Math.PI * (endAngle - 90)) / 180);

                    const largeArcFlag = percent > 50 ? 1 : 0;

                    return `<path d="M ${x1} ${y1} A 40 40 0 ${largeArcFlag} 1 ${x2} ${y2}" fill="none" stroke="${colors[i % colors.length]}" stroke-width="12" />`;
                }).join('');

                return `
                <div class="glass p-8 rounded-[2.5rem] border border-blue-100/50 dark:border-slate-800">
                    <div class="flex flex-col md:flex-row items-center gap-12">
                        <div class="relative w-48 h-48 flex-shrink-0">
                            <svg viewBox="0 0 100 100" class="w-full h-full transform -rotate-90">
                                <circle cx="50" cy="50" r="40" fill="none" stroke="#f1f5f9" stroke-width="12" class="dark:stroke-slate-800" />
                                ${chartPaths}
                                <circle cx="50" cy="50" r="28" fill="white" />
                            </svg>
                            <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                <span class="text-4xl font-black font-serif italic text-primary">${total}</span>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Finished</span>
                            </div>
                        </div>
                        <div class="flex-1 w-full text-left">
                            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Finished by Genre</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-2">
                                ${genreEntries.slice(0, 8).map(([genre, count], i) => `
                                    <div class="flex items-center justify-between text-sm py-1 border-b border-slate-50 dark:border-slate-800/50">
                                        <div class="flex items-center gap-2 truncate">
                                            <div class="w-2 h-2 rounded-full" style="background-color: ${colors[i % colors.length]}"></div>
                                            <span class="font-medium truncate">${genre}</span>
                                        </div>
                                        <span class="font-bold text-slate-400">${count}</span>
                                    </div>
                                `).join('')}
                                ${genreEntries.length === 0 ? '<p class="text-xs text-slate-400 italic">No finished books yet.</p>' : ''}
                            </div>
                        </div>
                    </div>
                    <div id="collaborator-stats-container" class="mt-12 pt-8 border-t border-slate-100 dark:border-slate-800">
                        ${renderCollaboratorStats()}
                    </div>
                </div>
                `;
            }

            function renderCollaboratorStats() {
                const partnerships = allPartnerships.length > 0 ? allPartnerships : allPartnershipsForUI;
                if (!partnerships || partnerships.length === 0) {
                    return `
                        <div class="text-center py-4">
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">No Collaborators yet</p>
                        </div>
                    `;
                }

                const containerId = `collab-stats-${Math.random().toString(36).substr(2, 9)}`;
                const partnerIds = partnerships.map(p => p.userId1 === currentUser.uid ? p.userId2 : p.userId1);

                Promise.all(partnerIds.map(id => db.collection('users').doc(id).get())).then(docs => {
                    const el = document.getElementById(containerId);
                    if (!el) return;

                    const stats = docs.map(doc => {
                        if (!doc.exists) return null;
                        const data = doc.data();
                        return {
                            name: data.displayName || data.email || 'Partner',
                            count: data.completedBooksCount || 0
                        };
                    }).filter(Boolean);

                    el.innerHTML = `
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Collaborator Activity</h3>
                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                            ${stats.map(s => `
                                <div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-2xl border border-slate-100 dark:border-slate-800 text-center">
                                    <div class="text-xl font-black font-serif italic text-primary">${s.count}</div>
                                    <div class="text-[10px] font-bold text-slate-400 uppercase truncate mt-1">${s.name}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                });

                return `<div id="${containerId}"><p class="text-xs text-slate-400 italic">Loading collaborator stats...</p></div>`;
            }

            function renderLibraryInsight() {
                const authorsCount = {};
                const ownersCount = {};
                const genresCount = {};
                const tagsCount = {};
                let totalValue = 0;
                const statusCounts = { finished: 0, reading: 0, want_to_read: 0 };

                books.forEach(b => {
                    const statusData = getStatusData(b.id);
                    const status = statusData.status;

                    if (statusData.isWishlist) {
                        if (status === 'finished') statusCounts.finished++;
                        return;
                    }

                    const author = b.author || 'Unknown';
                    authorsCount[author] = (authorsCount[author] || 0) + 1;

                    const owner = b.owner || 'Unknown';
                    ownersCount[owner] = (ownersCount[owner] || 0) + 1;

                    getBookGenres(b).forEach(g => {
                        genresCount[g] = (genresCount[g] || 0) + 1;
                    });

                    (b.tags || []).forEach(t => {
                        tagsCount[t] = (tagsCount[t] || 0) + 1;
                    });

                    totalValue += (parseFloat(b.price) || 0);

                    if (statusCounts.hasOwnProperty(status)) statusCounts[status]++;
                });

                return `
                <div class="max-w-4xl mx-auto space-y-12 animate-slide-up">
                    <div class="glass p-8 rounded-[2.5rem] border border-blue-100/50 dark:border-slate-800">
                        <h2 class="text-3xl font-black mb-8 font-serif italic text-blue-600 dark:text-blue-400">Library Insights</h2>

                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-10">
                            <div class="bg-primary p-6 rounded-3xl text-white shadow-lg shadow-primary/20 dark:shadow-none">
                                <div class="text-[10px] font-bold uppercase opacity-80 mb-1">Books</div>
                                <div class="text-4xl font-black font-serif">${books.filter(b => !getStatusData(b.id).isWishlist).length}</div>
                            </div>
                            <div class="bg-emerald-600 p-6 rounded-3xl text-white shadow-lg shadow-emerald-200 dark:shadow-none cursor-pointer" onclick="window.setTab('library'); window.clearAllFilters(); advancedFilters.minPrice = 0.01; renderLibraryOnly();">
                                <div class="text-[10px] font-bold uppercase opacity-80 mb-1">Value</div>
                                <div class="text-3xl font-black font-serif">$${Math.round(totalValue)}</div>
                            </div>
                            <div class="bg-amber-500 p-6 rounded-3xl text-white shadow-lg shadow-amber-200 dark:shadow-none">
                                <div class="text-[10px] font-bold uppercase opacity-80 mb-1">Goal</div>
                                <div class="text-3xl font-black font-serif">${statusCounts.finished} / ${readingGoal}</div>
                            </div>
                            <div class="bg-slate-100 dark:bg-slate-800 p-6 rounded-3xl border border-slate-200 dark:border-slate-700">
                                <div class="text-[10px] font-bold text-slate-400 uppercase mb-1">Genres</div>
                                <div class="text-3xl font-black font-serif">${Object.keys(genresCount).length}</div>
                            </div>
                        </div>

                        <div class="mb-10">
                            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Reading Progress</h3>
                            <div class="space-y-6">
                                ${Object.entries(statusCounts).map(([status, count]) => {
                                    const totalInProgress = books.filter(b => !getStatusData(b.id).isWishlist || getStatusData(b.id).status === 'finished').length;
                                    const percent = totalInProgress ? Math.round((count / totalInProgress) * 100) : 0;
                                    const color = status === 'finished' ? 'bg-emerald-500' : status === 'reading' ? 'bg-blue-500' : 'bg-slate-300 dark:bg-slate-600';
                                    return `
                                        <div>
                                            <div class="flex justify-between text-xs font-bold mb-2 uppercase tracking-tight">
                                                <span>${READING_STATUSES[status].label}</span>
                                                <span class="text-slate-400">${count} books (${percent}%)</span>
                                            </div>
                                            <div class="h-3 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                                                <div class="h-full ${color} transition-all duration-1000" style="width: ${percent}%"></div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-10">
                            <div>
                                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Top Genres</h3>
                                <div class="space-y-1">
                                    ${Object.entries(genresCount).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([name, count]) => `
                                        <div class="flex justify-between items-center text-sm cursor-pointer hover:bg-blue-50 dark:hover:bg-blue-900/20 p-2 rounded-xl transition-colors" onclick='window.applyInsightFilter("genre", "${name.replace(/"/g, "&quot;")}")' role="button" tabindex="0" onkeydown='if(event.key==="Enter"||event.key===" ") window.applyInsightFilter("genre", "${name.replace(/"/g, "&quot;")}")'>
                                            <span class="font-medium truncate mr-2">${name}</span>
                                            <span class="px-2 py-0.5 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg font-bold text-xs">${count}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <div>
                                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Top Tags</h3>
                                <div class="space-y-1">
                                    ${Object.entries(tagsCount).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([name, count]) => `
                                        <div class="flex justify-between items-center text-sm cursor-pointer hover:bg-amber-50 dark:hover:bg-amber-900/20 p-2 rounded-xl transition-colors" onclick='window.applyInsightFilter("tag", "${name.replace(/"/g, "&quot;")}")' role="button" tabindex="0" onkeydown='if(event.key==="Enter"||event.key===" ") window.applyInsightFilter("tag", "${name.replace(/"/g, "&quot;")}")'>
                                            <span class="font-medium truncate mr-2">${name}</span>
                                            <span class="px-2 py-0.5 bg-amber-50 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 rounded-lg font-bold text-xs">${count}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>

                        <div class="mt-10 pt-10 border-t border-slate-100 dark:border-slate-800 grid grid-cols-1 sm:grid-cols-2 gap-10">
                            <div>
                                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Top Authors</h3>
                                <div class="space-y-1">
                                    ${Object.entries(authorsCount).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([name, count]) => `
                                        <div class="flex justify-between items-center text-sm cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 p-2 rounded-xl transition-colors" onclick='window.applyInsightFilter("author", "${name.replace(/"/g, "&quot;")}")' role="button" tabindex="0" onkeydown='if(event.key==="Enter"||event.key===" ") window.applyInsightFilter("author", "${name.replace(/"/g, "&quot;")}")'>
                                            <span class="font-medium truncate mr-2">${name}</span>
                                            <span class="px-2 py-0.5 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-lg font-bold text-xs">${count}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <div>
                                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Top Owners</h3>
                                <div class="space-y-1">
                                    ${Object.entries(ownersCount).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([name, count]) => `
                                        <div class="flex justify-between items-center text-sm cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 p-2 rounded-xl transition-colors" onclick='window.applyInsightFilter("owner", "${name.replace(/"/g, "&quot;")}")' role="button" tabindex="0" onkeydown='if(event.key==="Enter"||event.key===" ") window.applyInsightFilter("owner", "${name.replace(/"/g, "&quot;")}")'>
                                            <span class="font-medium truncate mr-2">${name}</span>
                                            <span class="px-2 py-0.5 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-lg font-bold text-xs">${count}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }

            // ---------- Activity Tab ----------
            function renderActivity() {
                if (activities.length === 0) {
                    return `
                    <div class="flex flex-col items-center justify-center py-24 text-center">
                        <div class="w-20 h-20 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mb-6">
                            <svg class="w-10 h-10 text-slate-300 dark:text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        </div>
                        <h2 class="text-xl font-black font-serif italic text-slate-700 dark:text-slate-300">No Activity Yet</h2>
                        <p class="text-slate-500 dark:text-slate-400 text-sm max-w-xs mt-2">When you or your partners update library books, those events will appear here.</p>
                    </div>
                    `;
                }

                const html = `
                <div class="max-w-3xl mx-auto space-y-6 animate-slide-up">
                    <div class="flex items-center justify-between mb-2">
                        <h2 class="text-3xl font-black font-serif italic">Library Activity</h2>
                        <span class="px-3 py-1 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-full text-[10px] font-black uppercase tracking-widest">${activities.length} Events</span>
                    </div>
                    <div class="space-y-4">
                        ${activities.map((activity, idx) => {

                    switch (activity.type) {

                            icon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>';
                            actionText = 'added a new book';
                            badgeColor = 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400';
                            break;
                        case 'status_updated':
                            icon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
                            actionText = `marked as <span class="font-black uppercase text-[10px]">${READING_STATUSES[activity.status]?.label || activity.status}</span>`;
                            badgeColor = 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400';
                            break;
                        case 'rating_updated':
                            icon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.54 1.118l-3.976-2.888a1 1 0 00-1.175 0l-3.976 2.888c-.784.57-1.838-.197-1.539-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>';
                            actionText = `rated <span class="font-black text-amber-500">${activity.rating} ★</span>`;
                            badgeColor = 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400';
                            break;
                        case 'book_borrowed':
                            icon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>';
                            actionText = `lent to <span class="font-bold">${escapeHTML(activity.borrowedBy)}</span>`;
                            badgeColor = 'bg-violet-100 text-violet-700 dark:bg-violet-900/30 dark:text-violet-400';
                            break;
                        case 'book_returned':
                            icon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>';
                            actionText = 'marked as returned';
                            badgeColor = 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400';
                            break;
                        default:
                            icon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
                            actionText = 'performed an action';
                            badgeColor = 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-400';
                    }

                    return `
                        <div class="glass rounded-3xl p-5 border border-blue-100/50 dark:border-slate-800 hover:shadow-xl transition-all group">
                            <div class="flex items-start gap-4">
                                <div class="w-12 h-12 rounded-2xl ${badgeColor} flex items-center justify-center flex-shrink-0 shadow-sm group-hover:scale-110 transition-transform">
                                    ${icon}
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="flex flex-wrap items-center gap-x-2 text-sm">
                                        <span class="font-black text-primary">${escapeHTML(activity.userName || activity.addedBy || 'Someone')}</span>
                                        <span class="text-slate-500">${actionText}</span>
                                    </div>
                                    <h4 class="font-serif italic font-black text-lg mt-1 truncate">${escapeHTML(activity.bookTitle || activity.title)}</h4>
                                    <div class="flex items-center gap-3 mt-3">
                                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${formatDate(activity.timestamp)}</span>

            function formatDate(date) {
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMs / 3600000);
                const diffDays = Math.floor(diffMs / 86400000);

                if (diffMins < 1) return 'Just now';
                if (diffMins < 60) return `${diffMins} minute${diffMins > 1 ? 's' : ''} ago`;
                if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
                if (diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;

                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: date.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
            }

            function guessGenre(title) {
                const lower = title.toLowerCase();
                const keywords = {
                    'Islamic': ['islam', 'quran', 'hadith', 'prophet', 'prayer', 'আল্লাহ', 'ইসলাম', 'কোরআন', 'হাদীস', 'নবী', 'সালাত', 'দুয়া', 'জবাব', 'প্রত্যাবর্তন', 'প্যারাডক্সিক্যাল', 'সাজিদ', 'বড় আন্টির কাছে'],
                    'History': ['history', 'civilization', 'war', 'empire', 'ইতিহাস', 'শিকড়ের সন্ধানে'],
                    'Fiction': ['novel', 'story', 'fiction', 'উপন্যাস', 'গল্প', 'বিভূতিভূষণ'],
                    'Thriller': ['thriller', 'mystery', 'crime', 'থ্রিলার', 'রহস্য'],
                    'Science': ['science', 'physics', 'biology', 'মহাকাশ', 'বিজ্ঞান'],
                    'Childhood': ['parenting', 'child', 'প্যারেন্টিং', 'শিশু'],
                };

                for (const [genre, words] of Object.entries(keywords)) {
                    if (words.some(word => lower.includes(word.toLowerCase()))) return genre;
                }
                return 'Other';
            }

            async function undoImport() {
                if (!lastImportState) return;
                showToast('Undoing import...', 'info');

                const { addedIds, previousStates } = lastImportState;
                const batch = db.batch();

                // Delete added books
                addedIds.forEach(id => {
                    batch.delete(db.collection('books').doc(id));
                });

                // Revert updated books
                for (const [id, prevState] of Object.entries(previousStates)) {
                    batch.set(db.collection('books').doc(id), prevState);
                }

                try {
                    await batch.commit();
                    showToast('Import undone successfully', 'success');
                    lastImportState = null;
                } catch (err) {
                    showToast('Error undoing import: ' + err.message, 'error');
                }
            }

            function importCSV() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.csv';
                input.onchange = e => {
                    const file = e.target.files[0];
                    Papa.parse(file, {
                        header: true,
                        skipEmptyLines: true,
                        complete: async (results) => {
                            let importedCount = 0;
                            let updatedCount = 0;
                            const addedIds = [];
                            const previousStates = {};

                            const safeDate = (val) => {
                                const d = new Date(val);
                                return isNaN(d.getTime()) ? new Date().toISOString() : d.toISOString();
                            };

                            const importPromises = results.data.map(async row => {
                                const title = (row.Title || row.title || 'Untitled').trim();
                                const author = (row.Author || row.author || 'Unknown').trim() || 'Unknown';
                                let genreRaw = row.Genre || row.Genre || row.Category || row.category || '';
                                const owner = (row.Owner || row.owner || '').trim();
                                const isbn = (row.ISBN || row.isbn || '').trim();
                                const notes = (row.Notes || row.notes || row.Comments || row.comments || '').trim();
                                const price = row.Price || row.price ? parseFloat(row.Price || row.price) : null;
                                const dateAddedRaw = row['Date Added'] || row.date_added || row.Date || row.purchaseDate || new Date().toISOString();

                                if (!genreRaw) {
                                    genreRaw = guessGenre(title);
                                }

                                const categories = genreRaw.split(/[,;&]/).map(g => g.trim()).filter(Boolean);
                                if (categories.length === 0) categories.push('Other');

                                const bookData = {
                                    title,
                                    author,
                                    categories,
                                    owner,
                                    isbn,
                                    comments: notes,
                                    price,
                                    purchaseDate: safeDate(dateAddedRaw),
                                    source: 'imported',
                                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                                    userId: currentUser.uid
                                };

                                const duplicate = findDuplicateBook(bookData, currentUser.uid);

                                if (duplicate) {
                                    // Store previous state for undo
                                    previousStates[duplicate.id] = { ...duplicate };
                                    delete previousStates[duplicate.id].id; // Don't store id in doc

                                    await db.collection('books').doc(duplicate.id).update({
                                        ...bookData,
                                        category: firebase.firestore.FieldValue.delete() // Clean up old field
                                    });

                                    let status = (row.Status || row.status || 'want_to_read').toLowerCase().replace(/\s+/g, '_');
                                    if (status === 'unread') status = 'want_to_read';

                                    await db.collection('books').doc(duplicate.id).collection('readingStatus').doc(currentUser.uid).set({
                                        status: status,
                                        userId: currentUser.uid,
                                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                                    }, { merge: true });

                                    updatedCount++;
                                } else {
                                    bookData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                                    const docRef = await db.collection('books').add(bookData);
                                    addedIds.push(docRef.id);

                                    let status = (row.Status || row.status || 'want_to_read').toLowerCase().replace(/\s+/g, '_');
                                    if (status === 'unread') status = 'want_to_read';

                                    await docRef.collection('readingStatus').doc(currentUser.uid).set({
                                        status: status,
                                        userId: currentUser.uid,
                                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                                    });
                                    importedCount++;
                                }
                            });
                            await Promise.all(importPromises);

                            lastImportState = { addedIds, previousStates };

                            const toastMsg = `Imported ${importedCount} new, updated ${updatedCount} existing. <button onclick="window.undoImport()" class="ml-4 underline font-bold uppercase text-xs">Undo</button>`;
                            showToast(toastMsg, 'success', 10000);
                            window.undoImport = undoImport;
                        }
                    });
                };
                input.click();
            }

                                            </div>
                                            ${s.comment ? `<p class="text-sm text-slate-600 dark:text-slate-300 italic leading-relaxed">"${escapeHTML(s.comment)}"</p>` : ''}
                                            <p class="text-[8px] text-slate-400 mt-2 uppercase font-medium">${s.updatedAt ? new Date(s.updatedAt.toMillis()).toLocaleDateString() : ''}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        ${book.comments ? `
                            <div class="mt-8 pt-8 border-t border-slate-100 dark:border-slate-800">
                                <p class="text-[10px] font-bold text-slate-400 uppercase mb-4">Legacy Notes</p>
                                <div class="p-6 bg-slate-50 dark:bg-slate-800/50 rounded-[2rem] text-slate-600 dark:text-slate-300 italic leading-relaxed text-base border border-slate-100 dark:border-slate-800">"${escapeHTML(book.comments)}"</div>
                            </div>
                        ` : ''}

                        <div class="flex flex-col sm:flex-row items-center justify-between mt-10 gap-4">
                            <button id="delete-book-btn" class="w-full sm:w-auto px-8 py-4 text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/20 rounded-2xl font-bold transition-all">Delete</button>
                            <div class="flex w-full sm:w-auto gap-4">
                                <button id="edit-book-btn" class="flex-1 sm:flex-none px-8 py-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold hover:bg-blue-50 dark:hover:bg-slate-700 transition-all">Edit Details</button>
                                <button data-close class="flex-1 sm:flex-none px-10 py-4 bg-primary dark:bg-white text-white dark:text-primary rounded-2xl font-bold shadow-xl shadow-primary/20 dark:shadow-none hover:scale-105 active:scale-95 transition-all">Close</button>
                            </div>
                        </div>
                    </div>
                </div>
            `);

                document.getElementById('edit-book-btn').addEventListener('click', () => {
                    close();
                    openManualEntry(null, book);
                });

                document.getElementById('move-to-lib-btn')?.addEventListener('click', async () => {
                    try {
                        await db.collection('books').doc(book.id)
                            .collection('readingStatus').doc(currentUser.uid).update({ isWishlist: false });
                        showToast('Moved to library!', 'success');
                        close();
                        openBookDetails(books.find(b => b.id === book.id)); // refresh
                    } catch (err) { showToast('Error: ' + err.message, 'error'); }
                });

                document.getElementById('detail-wishlist-checkbox')?.addEventListener('change', async (e) => {
                    const val = e.target.checked;
                    try {
                        await db.collection('books').doc(book.id)
                            .collection('readingStatus').doc(currentUser.uid).update({ isWishlist: val });
                        showToast(val ? 'Added to wishlist' : 'Removed from wishlist', 'success');
                        close();
                        openBookDetails(books.find(b => b.id === book.id)); // refresh
                    } catch (err) { showToast('Error: ' + err.message, 'error'); }
                });

                document.getElementById('borrow-book-btn')?.addEventListener('click', async () => {
                    const name = document.getElementById('borrower-name').value.trim() || (currentUser.displayName || currentUser.email);
                    try {
                        await db.collection('books').doc(book.id).update({
                            borrowedBy: name,
                            borrowDate: new Date().toISOString()
                        });

                        await db.collection('activityFeed').add({
                            type: 'book_borrowed',
                            bookId: book.id,
                            bookTitle: book.title,
                            userName: currentUser.displayName || currentUser.email || currentUser.uid,
                            userId: currentUser.uid,
                            borrowedBy: name,
                            addedTo: book.userId === currentUser.uid ? 'My' : 'Partner',
                            libraryId: book.userId,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });

                        showToast(`Marked as borrowed by ${name}`, 'success');
                        close();
                    } catch (err) { showToast('Error: ' + err.message, 'error'); }
                });

                document.getElementById('save-rating-btn')?.addEventListener('click', async (e) => {
                    const btn = e.currentTarget;
                    const originalText = btn.innerText;
                    btn.disabled = true;
                    btn.innerText = 'Saving...';
                    const rating = parseInt(document.getElementById('detail-rating-select').value);
                    const comment = document.getElementById('detail-comment-textarea').value.trim();
                    try {
                        await db.collection('books').doc(book.id)
                            .collection('readingStatus').doc(currentUser.uid).set({
                                rating,
                                comment,
                                userId: currentUser.uid,
                                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                            }, { merge: true });

                        if (rating > 0 || comment) {
                            await db.collection('activityFeed').add({
                                type: 'rating_updated',
                                bookId: book.id,
                                bookTitle: book.title,
                                userName: currentUser.displayName || currentUser.email || currentUser.uid,
                                userId: currentUser.uid,
                                rating: rating,
                                comment: comment,
                                addedTo: book.userId === currentUser.uid ? 'My' : 'Partner',
                                libraryId: book.userId,
                                timestamp: firebase.firestore.FieldValue.serverTimestamp()
                            });
                        }

                        // Update average rating on the book document
                        const updatedStatusesSnapshot = await db.collection('books').doc(book.id).collection('readingStatus').get();
                        const updatedStatuses = updatedStatusesSnapshot.docs.map(doc => doc.data());
                        const allRatings = updatedStatuses.map(s => s.rating).filter(r => r > 0);
                        const newAvg = allRatings.length > 0 ? (allRatings.reduce((a, b) => a + b, 0) / allRatings.length) : 0;
                        const newCount = allRatings.length;

                        await db.collection('books').doc(book.id).update({
                            averageRating: newAvg,
                            ratingCount: newCount
                        });

                        showToast('Review saved!', 'success');
                        close();
                        // Small delay to ensure Firestore sync
                        setTimeout(() => openBookDetails(books.find(b => b.id === book.id)), 100);
                    } catch (err) {
                        showToast('Error: ' + err.message, 'error');
                        btn.disabled = false;
                        btn.innerText = originalText;
                    }
                });

                document.getElementById('detail-status-select')?.addEventListener('change', async (e) => {
                    const newStatus = e.target.value;
                    try {
                        const updateData = {
                            status: newStatus,
                            userId: currentUser.uid,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        };
                        if (newStatus !== 'reading') {
                            updateData.progress = 0;
                        }
                        await db.collection('books').doc(book.id)
                            .collection('readingStatus').doc(currentUser.uid).set(updateData, { merge: true });

                        await db.collection('activityFeed').add({
                            type: 'status_updated',
                            bookId: book.id,
                            bookTitle: book.title,
                            userName: currentUser.displayName || currentUser.email || currentUser.uid,
                            userId: currentUser.uid,
                            status: newStatus,
                            addedTo: book.userId === currentUser.uid ? 'My' : 'Partner',
                            libraryId: book.userId,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });

                        showToast('Status updated!', 'success');
                        close();
                        openBookDetails(books.find(b => b.id === book.id)); // refresh
                    } catch (err) { showToast('Error: ' + err.message, 'error'); }
                });

                document.getElementById('detail-progress-input')?.addEventListener('change', async (e) => {
                    const progress = parseInt(e.target.value) || 0;
                    try {
                        await db.collection('books').doc(book.id)
                            .collection('readingStatus').doc(currentUser.uid).set({
                                progress: progress,
                                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                            }, { merge: true });
                        showToast('Progress updated!', 'success');
                    } catch (err) { showToast('Error: ' + err.message, 'error'); }
                });

                document.getElementById('return-book-btn')?.addEventListener('click', async () => {
                    try {
                        await db.collection('books').doc(book.id).update({
                            borrowedBy: firebase.firestore.FieldValue.delete(),
                            borrowDate: firebase.firestore.FieldValue.delete()
                        });

                        await db.collection('activityFeed').add({
                            type: 'book_returned',
                            bookId: book.id,
                            bookTitle: book.title,
                            userName: currentUser.displayName || currentUser.email || currentUser.uid,
                            userId: currentUser.uid,
                            addedTo: book.userId === currentUser.uid ? 'My' : 'Partner',
                            libraryId: book.userId,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });

                        showToast('Book returned!', 'success');
                        close();
                    } catch (err) { showToast('Error: ' + err.message, 'error'); }
                });

                document.getElementById('delete-book-btn').addEventListener('click', async () => {
                    if (confirm('Are you sure you want to delete this book?')) {
                        try {
                            const batch = db.batch();
                            batch.delete(db.collection('books').doc(book.id));
                            // Cleanup user's reading status
                            batch.delete(db.collection('books').doc(book.id).collection('readingStatus').doc(currentUser.uid));
                            await batch.commit();

                            showToast('Book deleted.', 'info');
                            close();
                        } catch (err) { showToast('Error deleting: ' + err.message, 'error'); }
                    }
                });
            }

            // ---------- Global document click listener for book cards (added once) ----------
            document.addEventListener('click', e => {
                const card = e.target.closest('[data-book-id]');
                if (!card) return;

                const bookId = card.dataset.bookId;
                const book = books.find(b => b.id === bookId);
                if (!book) return;

                // If edit button on card clicked
                if (e.target.closest('button')) {
                    e.stopPropagation();
                    openManualEntry(null, book);
                    return;
                }
                openBookDetails(book);
            });

        })();
    </script>

    <style>
        /* Prevent layout shift during re-render */
        #main-content:empty {
            min-height: 50vh;
        }
    </style>

</body>

</html>
