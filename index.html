                                    <svg aria-hidden="true" class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            }

            // ---------- Firestore Sync ----------
            let unsubscribePartnershipBooks1 = null;
            let unsubscribePartnershipBooks2 = null;
            let unsubscribeOwnBooks = null;
            let unsubscribeActivity = null;

            async function subscribeToBooks() {
                if (unsubscribeBooks) unsubscribeBooks();
                if (unsubscribeStatus) unsubscribeStatus();
                if (unsubscribePartnershipBooks1) unsubscribePartnershipBooks1();
                if (unsubscribePartnershipBooks2) unsubscribePartnershipBooks2();
                if (unsubscribeOwnBooks) unsubscribeOwnBooks();
                if (unsubscribeActivity) unsubscribeActivity();
                if (!currentUser) return;

                let partnerships1 = [];
                let partnerships2 = [];

                // Query partnerships where current user is userId1
                unsubscribePartnershipBooks1 = db.collection('partnerships')
                    .where('userId1', '==', currentUser.uid)
                    .onSnapshot(snapshot => {
                        partnerships1 = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        allPartnerships = [...partnerships1, ...partnerships2];
                        fetchBooksFromPartnerships();
                    }, err => {
                        console.error("Partnership Query 1 Error:", err);
                    });

                // Query partnerships where current user is userId2
                unsubscribePartnershipBooks2 = db.collection('partnerships')
                    .where('userId2', '==', currentUser.uid)
                    .onSnapshot(snapshot => {
                        partnerships2 = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        allPartnerships = [...partnerships1, ...partnerships2];
                        fetchBooksFromPartnerships();
                    }, err => {
                        console.error("Partnership Query 2 Error:", err);
                    });

                function fetchBooksFromPartnerships() {
                    // Build list of user IDs to fetch books from
                    let userIdsToFetch = [currentUser.uid];

                    allPartnerships.forEach(partnership => {
                        const isUser1 = partnership.userId1 === currentUser.uid;
                        // Only include partner if current user hasn't unsubscribed
                        const currentUserUnsubscribed = isUser1 ? partnership.user1Unsubscribed : partnership.user2Unsubscribed;
                        if (!currentUserUnsubscribed) {
                            const partnerId = isUser1 ? partnership.userId2 : partnership.userId1;
                            if (!userIdsToFetch.includes(partnerId)) {
                                userIdsToFetch.push(partnerId);
                            }
                        }
                    });

                    // Firestore 'in' query supports max 10-30 items
                    if (unsubscribeOwnBooks) {
                        if (Array.isArray(unsubscribeOwnBooks)) unsubscribeOwnBooks.forEach(unsub => unsub());
                        else unsubscribeOwnBooks();
                    }

                    const bookUnsubs = [];
                    booksMap.clear();

                    for (let i = 0; i < userIdsToFetch.length; i += 10) {
                        const chunk = userIdsToFetch.slice(i, i + 10);
                        const unsub = db.collection('books')
                            .where('userId', 'in', chunk)
                            .onSnapshot(snapshot => {
                                // Incremental updates for efficiency
                                snapshot.docChanges().forEach(change => {
                                    if (change.type === 'removed') {
                                        booksMap.delete(change.doc.id);
                                    } else {
                                        booksMap.set(change.doc.id, normalizeBook(change.doc.id, change.doc.data()));
                                    }
                                });

                                // Update global array and sort newest first by default
                                books = Array.from(booksMap.values()).sort((a, b) => b._createdTime - a._createdTime);

                                // Refresh user profiles for grouping display with deduplication
                                const uidsToFetch = chunk.filter(uid => !userProfileCache[uid]);
                                if (uidsToFetch.length > 0) {
                                    Promise.all(uidsToFetch.map(uid => db.collection('users').doc(uid).get())).then(userDocs => {
                                        userDocs.forEach(doc => {
                                            if (doc.exists) {
                                                const data = doc.data();
                                                userProfileCache[doc.id] = data.displayName || data.email;
                                            }
                                        });
                                        updateLibraryCache();
                                        syncCompletedBooksCount();
                                        renderMainApp();
                                    });
                                } else {
                                    updateLibraryCache();
                                    syncCompletedBooksCount();
                                    renderMainApp();
                                }
                            }, err => {
                                console.error("Firestore Error for chunk:", chunk, err);
                            });
                        bookUnsubs.push(unsub);
                    }
                    unsubscribeOwnBooks = bookUnsubs;

                    // Subscribe to activity feed for these libraries
                    if (unsubscribeActivity) {
                        if (Array.isArray(unsubscribeActivity)) unsubscribeActivity.forEach(unsub => unsub());
                        else unsubscribeActivity();
                    }

                    const activityUnsubs = [];
                    let chunkedActivities = {};

                    for (let i = 0; i < userIdsToFetch.length; i += 10) {
                        const chunk = userIdsToFetch.slice(i, i + 10);
                        const unsub = db.collection('activityFeed')
                            .where('libraryId', 'in', chunk)
                            .orderBy('timestamp', 'desc')
                            .limit(30)
                            .onSnapshot(snapshot => {
                                chunkedActivities[i] = snapshot.docs.map(doc => ({
                                    id: doc.id,
                                    ...doc.data(),
                                    timestamp: doc.data().timestamp?.toDate() || new Date()
                                }));

                                // Merge and sort all chunked activities
                                activities = Object.values(chunkedActivities).flat().sort((a, b) => b.timestamp - a.timestamp).slice(0, 50);
                                if (activeTab === 'activity') renderMainApp();
                            }, err => {
                                console.error("Activity Listener Error for chunk:", chunk, err);
                            });
                        activityUnsubs.push(unsub);
                    }
                    unsubscribeActivity = activityUnsubs;

                    // Subscribe to partner reading statuses separately to comply with security rules
                    if (unsubscribePartnerStatus) {
                        if (Array.isArray(unsubscribePartnerStatus)) unsubscribePartnerStatus.forEach(unsub => unsub());
                        else unsubscribePartnerStatus();
                    }

                    const partnerStatusUnsubs = [];
                    const partnerIds = userIdsToFetch.filter(id => id !== currentUser.uid);

                    for (let i = 0; i < partnerIds.length; i += 10) {
                        const chunk = partnerIds.slice(i, i + 10);
                        const unsub = db.collectionGroup('readingStatus')
                            .where('userId', 'in', chunk)
                            .onSnapshot(snapshot => {
                                snapshot.docChanges().forEach(change => {
                                    const data = change.doc.data();
                                    const bookId = change.doc.ref.parent.parent.id;
                                    if (change.type === 'removed') {
                                        if (partnerReadingStatuses[bookId]) {
                                            delete partnerReadingStatuses[bookId][data.userId];
                                        }
                                    } else {
                                        if (!partnerReadingStatuses[bookId]) partnerReadingStatuses[bookId] = {};
                                        partnerReadingStatuses[bookId][data.userId] = {
                                            status: data.status,
                                            progress: data.progress || 0,
                                            isWishlist: data.isWishlist,
                                            updatedAt: data.updatedAt
                                        };
                                        // Pre-fetch partner name if not cached
                                        if (!userProfileCache[data.userId]) {
                                            db.collection('users').doc(data.userId).get().then(doc => {
                                                if (doc.exists) {
                                                    userProfileCache[data.userId] = doc.data()?.displayName || doc.data()?.email || 'Partner';
                                                    updateLibraryCache();
                                                    renderMainApp();
                                                }
                                            });
                                        }
                                    }
                                });
                                updateLibraryCache();
                                renderMainApp();
                            }, err => {
                                console.error("Partner Status Listener Error:", err);
                            });
                        partnerStatusUnsubs.push(unsub);
                    }
                    unsubscribePartnerStatus = partnerStatusUnsubs;
                }

                // Use a collection group listener to get reading statuses for THIS user efficiently.
                unsubscribeStatus = db.collectionGroup('readingStatus')
                    .where('userId', '==', currentUser.uid)
                    .onSnapshot(snapshot => {
                        isStatusesLoaded = true;
                        snapshot.docChanges().forEach(change => {
                            const data = change.doc.data();
                            const bookId = change.doc.ref.parent.parent.id;

                            if (change.type === 'removed') {
                                delete readingStatuses[bookId];
                            } else {
                                readingStatuses[bookId] = {
                                    status: data.status === 'unread' ? 'want_to_read' : (data.status || 'want_to_read'),
                                    rating: data.rating || 0,
                                    progress: data.progress || 0,
                                    comment: data.comment || '',
                                    tags: data.tags || [],
                                    isWishlist: data.isWishlist || false,
                                    price: data.price || null,
                                    purchaseDate: data.purchaseDate || null,
                                    updatedAt: data.updatedAt
                                };
                            }
                        });
                        updateLibraryCache();
                        syncCompletedBooksCount();
                        renderMainApp();
                    }, err => {
                        console.error("Status Listener Error (Reading Status sync failed):", err);
                        if (err.message.includes("requires an index")) {
                            showToast("Retrying status sync without index...", "info");
                            // Try fallback: just continue, ui will still work
                            isStatusesLoaded = true;
                            renderLibraryOnly();
                        }
                    });
            }

            // ---------- Scanner Logic ----------
            let scanner = null;
            let globalScanTargetLibrary = null; // Store globally for scanner flow

            // Helper: Show library selector for scanner
            async function showLibrarySelectorForScan() {
                const partnersWhoAllowAdding = allPartnerships.filter(p => p.allowAddBooks === true).map(p => {
                    const isUser1 = p.userId1 === currentUser.uid;
                    const partnerId = isUser1 ? p.userId2 : p.userId1;
                    return { partnershipId: p.id, userId: partnerId, isActive: isUser1 ? !p.user1Unsubscribed : !p.user2Unsubscribed };
                }).filter(p => p.isActive);

                if (partnersWhoAllowAdding.length === 0) {
                    globalScanTargetLibrary = currentUser.uid;
                    return;
                }

                return new Promise((resolve) => {
                    let destHtml = `
                    <div class="glass max-w-md w-full rounded-[2.5rem] p-8 shadow-2xl animate-slide-up">
                        <h2 class="text-2xl font-black mb-4">Add To Which Library?</h2>
                        <div class="space-y-3">
                            <label class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer border-2 border-transparent" data-dest="${currentUser.uid}">
                                <input type="radio" name="scan-library-dest" value="${currentUser.uid}" checked class="w-5 h-5 text-blue-600">
                                <span class="font-medium">My Library</span>
                            </label>
                    `;

                    partnersWhoAllowAdding.forEach(p => {
                        destHtml += `
                            <label class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer border-2 border-transparent" data-dest="${p.userId}" data-partner-id="${p.userId}">
                                <input type="radio" name="scan-library-dest" value="${p.userId}" class="w-5 h-5 text-blue-600">
                                <span class="font-medium" data-name="">Loading...</span>
                            </label>
                        `;
                    });

                    destHtml += `
                        <div class="flex gap-4 mt-8">
                            <button data-close class="flex-1 px-4 py-4 bg-slate-200 dark:bg-slate-700 rounded-2xl font-bold">Cancel</button>
                            <button id="scan-start-btn" class="flex-1 px-4 py-4 bg-blue-600 text-white rounded-2xl font-bold">Start Scan</button>
                        </div>
                    </div>
                    `;

                    const close = showModal(destHtml);

                    // Fetch partner names
                    Promise.all(partnersWhoAllowAdding.map(p =>
                        db.collection('users').doc(p.userId).get()
                    )).then(docs => {
                        partnersWhoAllowAdding.forEach((p, idx) => {
                            const label = modalContainer.querySelector(`[data-partner-id="${p.userId}"]`);
                            const nameSpan = label?.querySelector('[data-name]');
                            if (nameSpan && docs[idx].exists) {
                                const name = docs[idx].data()?.displayName || docs[idx].data()?.email || 'Partner';
                                nameSpan.textContent = `${name}'s Library`;
                            }
                        });
                    });

                    document.getElementById('scan-start-btn').addEventListener('click', () => {
                        const selected = document.querySelector('input[name="scan-library-dest"]:checked');
                        globalScanTargetLibrary = selected ? selected.value : currentUser.uid;
                        close();
                        resolve();
                    });
                });
            }

            function openScanner() {
                showLibrarySelectorForScan().then(() => {
                    const modalHtml = `
                    <div class="w-full h-full flex flex-col p-6 overflow-y-auto">
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-3xl font-black font-serif italic">Scan QR / Barcode</h2>
                            <button data-close class="p-3 bg-slate-100 dark:bg-slate-800 rounded-full hover:bg-slate-200 transition-colors" aria-label="Close scanner" title="Close scanner"><svg aria-hidden="true" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
                        </div>
                        <div class="flex-1 flex flex-col items-center justify-center">
                            <div id="reader" class="w-full max-w-lg aspect-square rounded-[3rem] overflow-hidden bg-slate-900 relative shadow-2xl">
                                <!-- Overlay for a more professional look -->
                                <div class="absolute inset-0 border-[40px] border-slate-900/40 pointer-events-none"></div>
                                <div class="absolute inset-[40px] border-2 border-blue-500/50 rounded-lg pointer-events-none animate-pulse"></div>
                            </div>
                            <p class="text-sm text-center text-slate-400 mt-8 uppercase tracking-widest font-bold">Align code within the frame</p>
                        </div>
                    </div>
                `;
                    const closeScanner = showModal(modalHtml, () => stopScanner(), true);

                    scanner = new Html5Qrcode("reader");
                    const config = {
                        fps: 20,
                        qrbox: { width: 250, height: 150 },
                        aspectRatio: 1.0
                    };

                    scanner.start(
                        { facingMode: "environment" },
                        config,
                        onScanSuccess,
                        onScanFailure
                    ).catch(err => {
                        console.warn("Camera start failed, falling back to any camera", err);
                        scanner.start({ facingMode: "user" }, config, onScanSuccess, onScanFailure);
                    });
                });
            }

            function stopScanner() {
                if (scanner) {
                    try { scanner.stop(); } catch (e) { }
                    scanner = null;
                }
            }

            async function onScanSuccess(decodedText) {
                if (navigator.vibrate) navigator.vibrate(50);
                stopScanner();
                modalContainer.innerHTML = '';
                modalContainer.classList.remove('pointer-events-auto');
                showToast('Processing code...', 'info');
                await fetchBookDetails(decodedText);
            }

            function onScanFailure(err) { /* silent */ }

            // ---------- Fetch Book Details (Google Books + Open Library + Smart Parsing) ----------
            async function fetchBookDetails(query) {
                // Try smart parse first
                const parsed = parseBookText(query);
                if (parsed && parsed.title) {
                    showApprovalModal(parsed, query);
                    return;
                }

                // Clean ISBN
                const clean = query.replace(/[^0-9X]/gi, '');
                const lookupTerm = clean || query.trim();

                let bookResult = null;

                try {
                    // 1. Try Google Books
                    let res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${lookupTerm}`);
                    let data = await res.json();
                    if (!data.items && !clean) {
                        res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=1`);
                        data = await res.json();
                    }

                    if (data.items && data.items.length > 0) {
                        const info = data.items[0].volumeInfo;
                        bookResult = {
                            title: info.title || 'Untitled',
                            author: info.authors ? info.authors.join(', ') : 'Unknown',
                            category: info.categories ? info.categories[0] : 'Other',
                            isbn: clean || (info.industryIdentifiers ? info.industryIdentifiers[0].identifier : ''),
                            thumbnail: info.imageLinks ? info.imageLinks.thumbnail.replace('http:', 'https:') : null,
                            tags: info.categories || []
                        };
                    }

                    // 2. Try Open Library if Google failed or thumbnail is missing
                    if (clean && (!bookResult || !bookResult.thumbnail)) {
                        const olRes = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${clean}&format=json&jscmd=data`);
                        const olData = await olRes.json();
                        const olBook = olData[`ISBN:${clean}`];

                        if (olBook) {
                            if (!bookResult) {
                                bookResult = {
                                    title: olBook.title,
                                    author: olBook.authors ? olBook.authors.map(a => a.name).join(', ') : 'Unknown',
                                    category: olBook.subjects ? olBook.subjects[0].name : 'Other',
                                    isbn: clean,
                                    tags: olBook.subjects ? olBook.subjects.map(s => s.name) : []
                                };
                            }
                            if (olBook.cover) {
                                bookResult.thumbnail = olBook.cover.large || olBook.cover.medium || olBook.cover.small;
                            }
                        }
                    }
                } catch (err) {
                    console.error("Fetch error:", err);
                }

                if (bookResult) {
                    const book = {
                        ...bookResult,
                        price: null,
                        purchaseDate: new Date().toISOString(),
                        comments: '',
                        source: 'scanned',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    addBookToFirestore(book, 'want_to_read', globalScanTargetLibrary || currentUser.uid);
                } else {
                    showToast('No book found. Please enter details.', 'info');
                    openManualEntry(query);
                }
            }

            function parseBookText(text) {
                const result = { title: null, author: null, isbn: null };
                const titleMatch = text.match(/(?:title|book)[:\s]+([^\n\r]+)/i);
                if (titleMatch) result.title = titleMatch[1].trim();
                const authorMatch = text.match(/(?:author|by)[:\s]+([^\n\r]+)/i);
                if (authorMatch) result.author = authorMatch[1].trim();
                const isbnMatch = text.match(/isbn[:\s]*([0-9-]+)/i);
                if (isbnMatch) result.isbn = isbnMatch[1].trim();
                return result.title ? result : null;
            }

            // Helper for duplicate detection within a specific user's library
            function findDuplicateBook(bookData, targetUserId) {
                const isbn = bookData.isbn?.replace(/[^0-9X]/gi, '');
                const title = bookData.title?.trim().toLowerCase();
                const author = bookData.author?.trim().toLowerCase();

                const targetLibraryBooks = books.filter(b => b.userId === targetUserId);

                let duplicate = null;
                if (isbn) {
                    duplicate = targetLibraryBooks.find(b => b.isbn?.replace(/[^0-9X]/gi, '') === isbn);
                }
                if (!duplicate && title && author) {
                    duplicate = targetLibraryBooks.find(b => b.title?.trim().toLowerCase() === title && b.author?.trim().toLowerCase() === author);
                }
                return duplicate;
            }

            // ---------- Firestore Write ----------
            async function addBookToFirestore(bookData, status = 'want_to_read', targetUserId = null) {
                if (!currentUser) return;
                targetUserId = targetUserId || currentUser.uid;
                const isAddingToSharedLibrary = targetUserId !== currentUser.uid;
                window.showLoading();

                try {
                    // Check for duplicate in TARGET library
                    const duplicate = findDuplicateBook(bookData, targetUserId);

                    if (duplicate) {
                        const targetName = targetUserId === currentUser.uid ? 'your library' : 'this library';
                        const confirmUpdate = confirm(`This book ("${duplicate.title}") is already in ${targetName}. Would you like to update the existing record instead?`);
                        if (!confirmUpdate) return null;

                        const updateData = {
                            ...bookData,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        };
                        delete updateData.createdAt;
                        delete updateData.userId;
                        delete updateData.readingStatus;

                        await db.collection('books').doc(duplicate.id).update(updateData);

                        // Update per-user reading status
                        await db.collection('books').doc(duplicate.id)
                            .collection('readingStatus').doc(currentUser.uid).set({
                                status: status,
                                rating: bookData.rating || 0,
                                progress: bookData.progress || 0,
                                comment: bookData.comments || '',
                                userId: currentUser.uid,
                                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                            }, { merge: true });

                        showToast('Existing book updated!', 'success');
                        return duplicate.id;
                    }

                    // Ensure default values to prevent visibility issues
                    const finalData = {
                        title: 'Untitled',
                        author: 'Unknown',
                        categories: ['Other'],
                        isWishlist: false,
                        rating: 0,
                        source: 'manual',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        ...bookData,
                        userId: targetUserId
                    };

                    // Track who added the book if it's being added to someone else's library
                    if (isAddingToSharedLibrary) {
                        finalData.addedBy = currentUser.uid;
                    }

                    delete finalData.readingStatus; // Don't store status on the book itself

                    const docRef = await db.collection('books').add(finalData);

                    // Save per-user reading status in subcollection
                    await docRef.collection('readingStatus').doc(currentUser.uid).set({
                        status: status,
                        rating: bookData.rating || 0,
                        progress: bookData.progress || 0,
                        comment: bookData.comments || '',
                        tags: bookData.tags || [],
                        isWishlist: bookData.isWishlist || false,
                        price: bookData.price || null,
                        purchaseDate: bookData.purchaseDate || null,
                        userId: currentUser.uid,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });

                    showToast('Book added!', 'success');

                    // Track activity for everyone
                    const partner = allPartnerships?.find(p => (p.userId1 === targetUserId || p.userId2 === targetUserId) && (p.userId1 !== targetUserId || p.userId2 !== targetUserId));
                    const targetUserName = targetUserId === currentUser.uid ? 'My' : 'Partner';
                    await db.collection('activityFeed').add({
                        type: 'book_added',
                        bookTitle: bookData.title || 'Unknown',
                        userName: currentUser.displayName || currentUser.email || currentUser.uid,
                        userId: currentUser.uid,
                        addedTo: targetUserName,
                        libraryId: targetUserId,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        bookId: docRef.id
                    });

                    return docRef.id;
                } catch (err) {
                    console.error("=== SAVE ERROR ===");
                    console.error('Error message:', err.message);
                    console.error('Error code:', err.code);
                    console.error('Full error:', err);

                    // Enhanced debugging for permission errors
                    if (err.code === 'permission-denied') {
                        console.error('PERMISSION DENIED - Debugging info:');
                        console.error('- Trying to add book to userId:', targetUserId);
                        console.error('- Current user:', currentUser.uid);
                        console.error('- Is shared library:', isAddingToSharedLibrary);

                        if (isAddingToSharedLibrary) {
                            const partnershipId = currentUser.uid < targetUserId ?
                                currentUser.uid + '_' + targetUserId :
                                targetUserId + '_' + currentUser.uid;
                            console.error('- Partnership ID:', partnershipId);
                            console.error('- Check Firestore: partnerships/' + partnershipId);
                            console.error('- Verify allowAddBooks field is set to true');
                        }
                    }

                    showToast('Error saving: ' + err.message, 'error');
                } finally {
                    window.hideLoading();
                }
            }

            function attachActivityListeners() {

                    .where('toUserId', '==', currentUser.uid)
                    .where('status', '==', 'pending')
                    .onSnapshot(snapshot => {
                        const requests = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        renderCollabRequests(requests);
                        updateNotificationsVisibility();

                    .where('toUserId', '==', currentUser.uid)

            function formatDate(date) {
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMs / 3600000);
                const diffDays = Math.floor(diffMs / 86400000);

                if (diffMins < 1) return 'Just now';
                if (diffMins < 60) return `${diffMins} minute${diffMins > 1 ? 's' : ''} ago`;
                if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
                if (diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;

                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: date.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
            }


            window.updateStarRating = (rating) => {
                const container = document.getElementById('star-rating-container');
                if (!container) return;

                container.dataset.rating = rating;
                const stars = container.querySelectorAll('button[data-star]');
                const clearBtn = document.getElementById('clear-rating-btn');

                if (clearBtn) clearBtn.classList.toggle('hidden', rating === 0);

                stars.forEach(star => {
                    const starVal = parseInt(star.dataset.star);
                    const svg = star.querySelector('svg');
                    if (starVal <= rating) {
                        star.classList.remove('text-slate-300', 'dark:text-slate-600');
                        star.classList.add('text-amber-400');
                        svg.classList.add('fill-current');
                        svg.classList.remove('fill-none');
                    } else {
                        star.classList.add('text-slate-300', 'dark:text-slate-600');
                        star.classList.remove('text-amber-400');
                        svg.classList.remove('fill-current');
                        svg.classList.add('fill-none');
                    }
                });

                if (rating > 0 && navigator.vibrate) {
                    navigator.vibrate([10]);
                }
            };

            window.transferBook = async (bookId) => {
                const book = books.find(b => b.id === bookId);
                if (!book || book.userId !== currentUser.uid) {
                    showToast("Only the book owner can initiate a transfer.", "error");
                    return;
                }
                window.bulkTransfer([bookId]);
            };

            window.bulkTransfer = async (bookIdsArg = null) => {
                const selectedIds = bookIdsArg || Array.from(selectedBookIds);
                if (!selectedIds.length) return;

                // Ensure all selected books belong to current user
                const myBooksToTransfer = selectedIds.filter(id => {
                    const book = books.find(b => b.id === id);
                    return book && book.userId === currentUser.uid;
                });

                if (myBooksToTransfer.length === 0) {
                    showToast("Only books you own can be transferred.", "error");
                    return;
                }

                const partners = allPartnerships.map(p => {
                    const isUser1 = p.userId1 === currentUser.uid;
                    const partnerId = isUser1 ? p.userId2 : p.userId1;
                    return { userId: partnerId, isActive: isUser1 ? !p.user1Unsubscribed : !p.user2Unsubscribed };
                }).filter(p => p.isActive);

                if (partners.length === 0) {
                    showToast("You need an active partnership to transfer books.", "info");
                    return;
                }

                let transferHtml = `
                    <div class="glass max-w-md w-full rounded-[2.5rem] p-8 shadow-2xl animate-slide-up">
                        <h2 class="text-2xl font-black mb-2 font-serif italic">Transfer ${myBooksToTransfer.length > 1 ? myBooksToTransfer.length + ' Books' : 'Book'}</h2>
                        <p class="text-slate-500 text-sm mb-6">Transfer ownership to a collaborator. They will need to accept the transfer.</p>
                        <div class="space-y-3 mb-8">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Select Recipient</p>
                `;

                partners.forEach((p, idx) => {
                    transferHtml += `
                        <label class="flex items-center gap-3 p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-slate-100 dark:border-slate-800 cursor-pointer hover:bg-blue-50 dark:hover:bg-blue-900/10 transition-colors">
                            <input type="radio" name="transfer-dest" value="${p.userId}" ${idx === 0 ? 'checked' : ''} class="w-5 h-5 text-primary">
                            <span class="text-sm font-bold" data-partner-id="${p.userId}">Loading collaborator...</span>
                        </label>
                    `;
                });

                transferHtml += `
                        </div>
                        <div class="flex gap-4">
                            <button data-close class="flex-1 px-4 py-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold">Cancel</button>
                            <button id="confirm-transfer-btn" class="flex-1 px-4 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-200 dark:shadow-none transition-transform active:scale-95">Send Request</button>
                        </div>
                    </div>
                `;

                const close = showModal(transferHtml);

                // Fetch names
                Promise.all(partners.map(p => db.collection('users').doc(p.userId).get())).then(docs => {
                    partners.forEach((p, idx) => {
                        const span = modalContainer.querySelector(`[data-partner-id="${p.userId}"]`);
                        if (span && docs[idx].exists) {
                            const data = docs[idx].data();
                            span.textContent = data.displayName || data.email || "Collaborator";
                        }
                    });
                });

                document.getElementById('confirm-transfer-btn').addEventListener('click', async () => {
                    const selected = modalContainer.querySelector('input[name="transfer-dest"]:checked');
                    if (!selected) return;
                    const targetUserId = selected.value;

                    if (!confirm(`Send transfer request for ${myBooksToTransfer.length} books?`)) return;

                    window.showLoading();
                    try {
                        const targetUserDoc = await db.collection('users').doc(targetUserId).get();
                        const targetName = targetUserDoc.exists ? (targetUserDoc.data().displayName || targetUserDoc.data().email) : "Collaborator";

                        const bookDetails = myBooksToTransfer.map(id => {
                            const b = books.find(book => book.id === id);
                            return { id, title: b.title };
                        });

                        await db.collection('transferRequests').add({
                            fromUserId: currentUser.uid,
                            fromUserName: currentUser.displayName || currentUser.email,
                            toUserId: targetUserId,
                            toUserName: targetName,
                            bookIds: myBooksToTransfer,
                            bookDetails: bookDetails,
                            status: 'pending',
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });

                        showToast(`Transfer request sent to ${targetName}`, 'success');
                        if (!bookIdsArg) window.clearSelection();
                        close();
                    } catch (err) {
                        showToast("Failed to send request: " + err.message, "error");
                    } finally {
                        window.hideLoading();
                    }
                });
            };

            window.cycleBookStatus = async (bookId, event) => {
                if (event) event.stopPropagation();
                if (!currentUser) return;

                const statusData = getStatusData(bookId);
                const currentStatus = statusData.status;

                const sequence = ['want_to_read', 'reading', 'finished'];
                let nextIndex = sequence.indexOf(currentStatus);
                if (nextIndex === -1) nextIndex = 0;
                else nextIndex = (nextIndex + 1) % sequence.length;

            function guessGenre(title) {
                const lower = title.toLowerCase();
                const keywords = {
                    'Islamic': ['islam', 'quran', 'hadith', 'prophet', 'prayer', 'আল্লাহ', 'ইসলাম', 'কোরআন', 'হাদীস', 'নবী', 'সালাত', 'দুয়া', 'জবাব', 'প্রত্যাবর্তন', 'প্যারাডক্সিক্যাল', 'সাজিদ', 'বড় আন্টির কাছে'],
                    'History': ['history', 'civilization', 'war', 'empire', 'ইতিহাস', 'শিকড়ের সন্ধানে'],
                    'Fiction': ['novel', 'story', 'fiction', 'উপন্যাস', 'গল্প', 'বিভূতিভূষণ'],
                    'Thriller': ['thriller', 'mystery', 'crime', 'থ্রিলার', 'রহস্য'],
                    'Science': ['science', 'physics', 'biology', 'মহাকাশ', 'বিজ্ঞান'],
                    'Childhood': ['parenting', 'child', 'প্যারেন্টিং', 'শিশু'],
                };

                for (const [genre, words] of Object.entries(keywords)) {
                    if (words.some(word => lower.includes(word.toLowerCase()))) return genre;
                }
                return 'Other';
            }

            async function undoImport() {
                if (!lastImportState) return;
                showToast('Undoing import...', 'info');
                window.showLoading();

                const { addedIds, previousStates } = lastImportState;
                const batch = db.batch();

                // Delete added books
                addedIds.forEach(id => {
                    batch.delete(db.collection('books').doc(id));
                });

                // Revert updated books
                for (const [id, prevState] of Object.entries(previousStates)) {
                    batch.set(db.collection('books').doc(id), prevState);
                }

                try {
                    await batch.commit();
                    showToast('Import undone successfully', 'success');
                    lastImportState = null;
                } catch (err) {
                    showToast('Error undoing import: ' + err.message, 'error');
                } finally {
                    window.hideLoading();
                }
            }

            function importCSV() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.csv';
                input.onchange = e => {
                    const file = e.target.files[0];
                    Papa.parse(file, {
                        header: true,
                        skipEmptyLines: true,
                        complete: async (results) => {
                            let importedCount = 0;
                            let updatedCount = 0;
                            const addedIds = [];
                            const previousStates = {};

                            const safeDate = (val) => {
                                const d = new Date(val);
                                return isNaN(d.getTime()) ? new Date().toISOString() : d.toISOString();
                            };

                            window.showLoading();

                            // Process in chunks of 250 (since each book might involve 2 operations)
                            const chunkSize = 250;
                            for (let i = 0; i < results.data.length; i += chunkSize) {
                                const chunk = results.data.slice(i, i + chunkSize);
                                const batch = db.batch();

                                for (const row of chunk) {
                                    const title = (row.Title || row.title || 'Untitled').trim();
                                    const author = (row.Author || row.author || 'Unknown').trim() || 'Unknown';
                                    let genreRaw = row.Genre || row.Genre || row.Category || row.category || '';
                                    const owner = (row.Owner || row.owner || '').trim();
                                    const isbn = (row.ISBN || row.isbn || '').trim();
                                    const notes = (row.Notes || row.notes || row.Comments || row.comments || '').trim();
                                    const price = row.Price || row.price ? parseFloat(row.Price || row.price) : null;
                                    const dateAddedRaw = row['Date Added'] || row.date_added || row.Date || row.purchaseDate || new Date().toISOString();

                                    if (!genreRaw) {
                                        genreRaw = guessGenre(title);
                                    }

                                    const categories = genreRaw.split(/[,;&]/).map(g => g.trim()).filter(Boolean);
                                    if (categories.length === 0) categories.push('Other');

                                    const bookData = {
                                        title,
                                        author,
                                        categories,
                                        owner,
                                        isbn,
                                        comments: notes,
                                        price,
                                        purchaseDate: safeDate(dateAddedRaw),
                                        source: 'imported',
                                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                                        userId: currentUser.uid
                                    };

                                    const duplicate = findDuplicateBook(bookData, currentUser.uid);

                                    if (duplicate) {
                                        // Store previous state for undo
                                        previousStates[duplicate.id] = { ...duplicate };
                                        delete previousStates[duplicate.id].id;

                                        const bookRef = db.collection('books').doc(duplicate.id);
                                        batch.update(bookRef, {
                                            ...bookData,
                                            category: firebase.firestore.FieldValue.delete()
                                        });

                                        let status = (row.Status || row.status || 'want_to_read').toLowerCase().replace(/\s+/g, '_');
                                        if (status === 'unread') status = 'want_to_read';

                                        const statusRef = bookRef.collection('readingStatus').doc(currentUser.uid);
                                        batch.set(statusRef, {
                                            status: status,
                                            userId: currentUser.uid,
                                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                                        }, { merge: true });

                                        updatedCount++;
                                    } else {
                                        bookData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                                        const bookRef = db.collection('books').doc();
                                        batch.set(bookRef, bookData);
                                        addedIds.push(bookRef.id);

                                        let status = (row.Status || row.status || 'want_to_read').toLowerCase().replace(/\s+/g, '_');
                                        if (status === 'unread') status = 'want_to_read';

                                        const statusRef = bookRef.collection('readingStatus').doc(currentUser.uid);
                                        batch.set(statusRef, {
                                            status: status,
                                            userId: currentUser.uid,
                                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                                        });
                                        importedCount++;
                                    }
                                }
                                await batch.commit();
                            }

                            lastImportState = { addedIds, previousStates };
                            window.hideLoading();

                            const toastMsg = `Imported ${importedCount} new, updated ${updatedCount} existing. <button onclick="window.undoImport()" class="ml-4 underline font-bold uppercase text-xs">Undo</button>`;
                            showToast(toastMsg, 'success', 10000);

            window.manualSyncFinishedBooks = async () => {
                if (!currentUser) return;

                if (btn) {
                    btn.disabled = true;

                try {
                    // Perform a fresh query to the database to count finished books
                    let finishedCount = 0;
                    const processedBookIds = new Set();

                    // 1. Check readingStatus subcollections (modern architecture)
                    // We only filter by userId to use the existing index
                    const statusSnapshot = await db.collectionGroup('readingStatus')
                        .where('userId', '==', currentUser.uid)

                    statusSnapshot.forEach(doc => {

                        if (data.status === 'finished' && data.isWishlist !== true) {
                            finishedCount++;
                            processedBookIds.add(doc.ref.parent.parent.id);

                    // 2. Check main books collection for legacy data (owned by user)
                    const legacySnapshot = await db.collection('books')
                        .where('userId', '==', currentUser.uid)
                        .get();

                        const data = doc.data();
                        if (data.status === 'finished' && data.isWishlist !== true && !processedBookIds.has(doc.id)) {

                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });
                        showToast('Moved to library!', 'success');
                        close();
                    } catch (err) {
                        showToast('Error: ' + err.message, 'error');
                        btn.disabled = false;
                    }
                });

                document.getElementById('add-to-wishlist-btn')?.addEventListener('click', async (e) => {
                    const btn = e.currentTarget;
                    btn.disabled = true;
                    window.showLoading();
                    try {
                        const newBookData = { ...book };
                        delete newBookData.id;
                        delete newBookData._genres;
                        delete newBookData._escTitle;
                        delete newBookData._escAuthor;
                        delete newBookData._escOwner;
                        delete newBookData._escGenres;
                        delete newBookData._escJsAuthor;
                        delete newBookData._escJsOwner;
                        delete newBookData._formattedPurchaseDate;
                        delete newBookData._normalizedTags;
                        delete newBookData._searchBlob;
                        delete newBookData._createdTime;
                        delete newBookData._purchaseTime;
                        delete newBookData._cache;

                        // Set current user as owner for their wishlist
                        newBookData.userId = currentUser.uid;
                        newBookData.isWishlist = true;
                        newBookData.owner = userProfile?.displayName || currentUser.email;
                        newBookData.ownerId = currentUser.uid;
                        newBookData.ownerEmail = currentUser.email;

                        await addBookToFirestore(newBookData, 'want_to_read', currentUser.uid);
                        showToast('Added to your wishlist!', 'success');
                        close();
                    } catch (err) {
                        showToast('Error: ' + err.message, 'error');
                        btn.disabled = false;
                    } finally {
                        window.hideLoading();
                    }
                });

                document.getElementById('borrow-book-btn')?.addEventListener('click', async (e) => {
                    const btn = e.currentTarget;
                    const originalText = btn.innerText;
                    btn.disabled = true;
                    btn.innerText = 'Borrowing...';
                    const name = document.getElementById('borrower-name').value.trim() || (currentUser.displayName || currentUser.email);
                    try {
                        await db.collection('books').doc(book.id).update({
                            borrowedBy: name,
                            borrowDate: new Date().toISOString()
                        });

                        await db.collection('activityFeed').add({
                            type: 'book_borrowed',
                            bookId: book.id,
                            bookTitle: book.title,
                            userName: currentUser.displayName || currentUser.email || currentUser.uid,
                            userId: currentUser.uid,
                            borrowedBy: name,
                            addedTo: book.userId === currentUser.uid ? 'My' : 'Partner',
                            libraryId: book.userId,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });

                        showToast(`Marked as borrowed by ${name}`, 'success');
                        close();
                    } catch (err) {
                        showToast('Error: ' + err.message, 'error');
                        btn.disabled = false;
                        btn.innerText = originalText;
                    }
                });

                const starRatingContainer = document.getElementById('star-rating-container');
                if (starRatingContainer) {
                    const stars = starRatingContainer.querySelectorAll('button[data-star]');
                    stars.forEach(star => {
                        star.addEventListener('mouseenter', () => {
                            const hoverVal = parseInt(star.dataset.star);
                            stars.forEach(s => {
                                const sVal = parseInt(s.dataset.star);
                                const svg = s.querySelector('svg');
                                if (sVal <= hoverVal) {
                                    s.classList.add('text-amber-400');
                                    s.classList.remove('text-slate-300', 'dark:text-slate-600');
                                    svg.classList.add('fill-current');
                                    svg.classList.remove('fill-none');
                                } else {
                                    s.classList.remove('text-amber-400');
                                    s.classList.add('text-slate-300', 'dark:text-slate-600');
                                    svg.classList.remove('fill-current');
                                    svg.classList.add('fill-none');
                                }
                            });
                        });
                        star.addEventListener('mouseleave', () => {
                            const currentRating = parseInt(starRatingContainer.dataset.rating || 0);
                            stars.forEach(s => {
                                const sVal = parseInt(s.dataset.star);
                                const svg = s.querySelector('svg');
                                if (sVal <= currentRating) {
                                    s.classList.add('text-amber-400');
                                    s.classList.remove('text-slate-300', 'dark:text-slate-600');
                                    svg.classList.add('fill-current');
                                    svg.classList.remove('fill-none');
                                } else {
                                    s.classList.remove('text-amber-400');
                                    s.classList.add('text-slate-300', 'dark:text-slate-600');
                                    svg.classList.remove('fill-current');
                                    svg.classList.add('fill-none');
                                }
                            });
                        });
                        star.addEventListener('click', () => {
                            const newVal = parseInt(star.dataset.star);
                            window.updateStarRating(newVal);
                        });
                    });
                }

                document.getElementById('save-rating-btn')?.addEventListener('click', async (e) => {
                    const btn = e.currentTarget;
                    const originalText = btn.innerText;
                    btn.disabled = true;
                    btn.innerText = 'Saving...';
                    window.showLoading();
                    const ratingContainer = document.getElementById('star-rating-container');
                    const rating = parseInt(ratingContainer?.dataset.rating || 0);
                    const comment = document.getElementById('detail-comment-textarea').value.trim();
                    try {
                        await db.collection('books').doc(book.id)
                            .collection('readingStatus').doc(currentUser.uid).set({
                                rating,
                                comment,
                                userId: currentUser.uid,
                                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                            }, { merge: true });

                        if (rating > 0 || comment) {
                            await db.collection('activityFeed').add({
                                type: 'rating_updated',
                                bookId: book.id,
                                bookTitle: book.title,
                                userName: currentUser.displayName || currentUser.email || currentUser.uid,
                                userId: currentUser.uid,
                                rating: rating,
                                comment: comment,
                                addedTo: book.userId === currentUser.uid ? 'My' : 'Partner',
                                libraryId: book.userId,
                                timestamp: firebase.firestore.FieldValue.serverTimestamp()
                            });
                        }

                        // Update average rating on the book document
                        const updatedStatusesSnapshot = await db.collection('books').doc(book.id).collection('readingStatus').get();
                        const updatedStatuses = updatedStatusesSnapshot.docs.map(doc => doc.data());
                        const allRatings = updatedStatuses.map(s => s.rating).filter(r => r > 0);
                        const newAvg = allRatings.length > 0 ? (allRatings.reduce((a, b) => a + b, 0) / allRatings.length) : 0;
                        const newCount = allRatings.length;

                        await db.collection('books').doc(book.id).update({
                            averageRating: newAvg,
                            ratingCount: newCount
                        });

                        showToast('Review saved!', 'success');
                        close();
                        // Small delay to ensure Firestore sync
                        setTimeout(() => openBookDetails(books.find(b => b.id === book.id)), 100);
                    } catch (err) {
                        showToast('Error: ' + err.message, 'error');
                        btn.disabled = false;
                        btn.innerText = originalText;
                    } finally {
                        window.hideLoading();
                    }
                });

                document.getElementById('detail-status-select')?.addEventListener('change', async (e) => {
                    const newStatus = e.target.value;
                    try {
                        const updateData = {
                            status: newStatus,
                            userId: currentUser.uid,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        };
                        if (newStatus === 'finished') {
                            updateData.progress = 100;
                        } else if (newStatus !== 'reading') {
                            updateData.progress = 0;
                        }
                        await db.collection('books').doc(book.id)
                            .collection('readingStatus').doc(currentUser.uid).set(updateData, { merge: true });

                        // Immediate local update for UI reactivity
                        readingStatuses[book.id] = {
                            ...readingStatuses[book.id],
                            ...updateData
                        };
                        updateLibraryCache();
                        renderMainApp();

                        await db.collection('activityFeed').add({
                            type: 'status_updated',
                            bookId: book.id,
                            bookTitle: book.title,
                            userName: currentUser.displayName || currentUser.email || currentUser.uid,
                            userId: currentUser.uid,
                            status: newStatus,
                            addedTo: book.userId === currentUser.uid ? 'My' : 'Partner',
                            libraryId: book.userId,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });

                        showToast('Status updated!', 'success');
                        const container = document.getElementById('detail-status-select').parentElement;
                        if (newStatus === 'reading') {
                            if (!document.getElementById('detail-progress-input')) {
                                const input = document.createElement('input');
                                input.id = 'detail-progress-input';
                                input.type = 'number';
                                input.min = '0';
                                input.max = '100';
                                input.value = '0';
                                input.className = 'w-20 px-3 py-2 text-sm bg-slate-100 dark:bg-slate-800 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none';
                                input.placeholder = '%';
                                container.appendChild(input);
                                input.addEventListener('change', async (ev) => {
                                    const progress = parseInt(ev.target.value) || 0;
                                    try {
                                        const updateData = {
                                            progress: progress,
                                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                                        };
                                        if (progress === 100) {
                                            if (navigator.vibrate) navigator.vibrate([10, 30, 10, 30, 10]);
                                            showToast("Congratulations! You've reached 100%! 📚✨", 'success', 5000);
                                        } else {
                                            showToast('Progress updated!', 'success');
                                        }
                                        await db.collection('books').doc(book.id)
                                            .collection('readingStatus').doc(currentUser.uid).set(updateData, { merge: true });

                                        // Immediate local update for UI reactivity
                                        readingStatuses[book.id] = {
                                            ...readingStatuses[book.id],
                                            ...updateData
                                        };
                                        updateLibraryCache();
                                        renderMainApp();
                                    } catch (err) { showToast('Error: ' + err.message, 'error'); }
                                });
                            }
                        } else {
                            document.getElementById('detail-progress-input')?.remove();
                        }
                    } catch (err) { showToast('Error: ' + err.message, 'error'); }
                });

                const progressInput = document.getElementById('detail-progress-input');
                const progressSlider = document.getElementById('detail-progress-slider');
                if (progressInput && progressSlider) {
                    const syncProgress = (val) => {
                        progressInput.value = val;
                        progressSlider.value = val;
                    };
                    [progressInput, progressSlider].forEach(el => {
                        el.addEventListener('input', (e) => syncProgress(e.target.value));
                        el.addEventListener('change', async (e) => {
                            const progress = parseInt(e.target.value) || 0;
                            syncProgress(progress);
                            try {
                                const updateData = {
                                    progress: progress,
                                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                                };
                                if (progress === 100) {
                                    if (navigator.vibrate) navigator.vibrate([10, 30, 10, 30, 10]);
                                    showToast("Congratulations! You've reached 100%! 📚✨", 'success', 5000);
                                } else {
                                    showToast('Progress updated!', 'success');
                                }
                                await db.collection('books').doc(book.id)
                                    .collection('readingStatus').doc(currentUser.uid).set(updateData, { merge: true });

                                // Immediate local update for UI reactivity
                                readingStatuses[book.id] = {
                                    ...readingStatuses[book.id],
                                    ...updateData
                                };
                                updateLibraryCache();
                                renderMainApp();
                            } catch (err) { showToast('Error: ' + err.message, 'error'); }
                        });
                    });
                }

                document.getElementById('return-book-btn')?.addEventListener('click', async (e) => {
                    const btn = e.currentTarget;
                    const originalText = btn.innerText;
                    btn.disabled = true;
                    btn.innerText = 'Returning...';
                    window.showLoading();
                    try {
                        await db.collection('books').doc(book.id).update({
                            borrowedBy: firebase.firestore.FieldValue.delete(),
                            borrowDate: firebase.firestore.FieldValue.delete()
                        });

                        await db.collection('activityFeed').add({
                            type: 'book_returned',
                            bookId: book.id,
                            bookTitle: book.title,
                            userName: currentUser.displayName || currentUser.email || currentUser.uid,
                            userId: currentUser.uid,
                            addedTo: book.userId === currentUser.uid ? 'My' : 'Partner',
                            libraryId: book.userId,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });

                        showToast('Book returned!', 'success');
                        close();
                    } catch (err) {
                        showToast('Error: ' + err.message, 'error');
                        btn.disabled = false;
                        btn.innerText = originalText;
                    } finally {
                        window.hideLoading();
                    }
                });

                document.getElementById('delete-book-btn').addEventListener('click', async (e) => {
                    if (isCollaboratorBook) {
                        showToast("Only the owner can delete this book.", "error");
                        return;
                    }
                    if (confirm('Are you sure you want to delete this book?')) {
                        const btn = e.currentTarget;
                        const originalText = btn.innerText;
                        btn.disabled = true;
                        btn.innerText = 'Deleting...';
                        window.showLoading();
                        try {
                            const batch = db.batch();
                            batch.delete(db.collection('books').doc(book.id));
                            // Cleanup user's reading status
                            batch.delete(db.collection('books').doc(book.id).collection('readingStatus').doc(currentUser.uid));
                            await batch.commit();

                            showToast('Book deleted.', 'info');
                            close();
                        } catch (err) {
                            showToast('Error deleting: ' + err.message, 'error');
                            btn.disabled = false;
                            btn.innerText = originalText;
                        } finally {
                            window.hideLoading();
                        }
                    }
                });
            } catch (err) {
                console.error('Error opening book details:', err);
                showToast('Could not open book details: ' + err.message, 'error');
            }
        }

        // ---------- Global document click listener for book cards (added once) ----------
        document.addEventListener('click', e => {
            const card = e.target.closest('[data-book-id]');
            if (!card) return;

            const bookId = card.dataset.bookId;
            const book = books.find(b => b.id === bookId);
            if (!book) return;

            // If edit button on card clicked
            if (e.target.closest('button')) {
                e.stopPropagation();
                openManualEntry(null, book);
                return;
            }
            openBookDetails(book);
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') {
                const card = e.target.closest('.book-card');
                if (card && e.target === card) {
                    e.preventDefault();
                    const bookId = card.dataset.bookId;
                    const book = books.find(b => b.id === bookId);
                    if (book) openBookDetails(book);
                }
            }
        });

        // Swipe Gestures
        let touchStartX = 0;
        let touchCurrentX = 0;
        let currentSwipingCard = null;

        document.addEventListener('touchstart', e => {
            const card = e.target.closest('.book-card');
            if (!card || activeTab === 'wishlist' || (activeTab === 'my_books' && myBooksSubTab === 'wishlist')) return;
            touchStartX = e.touches[0].clientX;
            touchCurrentX = touchStartX;
            currentSwipingCard = card;
        }, { passive: true });

        document.addEventListener('touchmove', e => {
            if (!currentSwipingCard) return;
            touchCurrentX = e.touches[0].clientX;
            const diff = touchStartX - touchCurrentX;

            if (diff > 20) { // Swiping left
                currentSwipingCard.classList.add('swiping');
                const translate = Math.min(diff, 100);
                currentSwipingCard.style.transform = `translateX(-${translate}px)`;

                // Ensure overlay exists
                let overlay = currentSwipingCard.querySelector('.swipe-overlay');
                if (!overlay) {
                    overlay = document.createElement('div');
                    overlay.className = 'swipe-overlay';
                    currentSwipingCard.appendChild(overlay);
                }

                const bookId = currentSwipingCard.dataset.bookId;
                const statusData = getStatusData(bookId);
                const currentStatus = statusData.status;

                if (currentStatus === 'want_to_read') {
                    overlay.style.background = '#3b82f6'; // blue
                    overlay.innerHTML = `
                            <div class="flex flex-col items-center gap-1">
                                <svg aria-hidden="true" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                                <span class="text-[8px] font-black uppercase">Mark Reading</span>
                            </div>
                        `;
                } else if (currentStatus === 'reading') {
                    overlay.style.background = '#10b981'; // emerald
                    overlay.innerHTML = `
                            <div class="flex flex-col items-center gap-1">
                                <svg aria-hidden="true" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                <span class="text-[8px] font-black uppercase">Mark Finished</span>
                            </div>
                        `;
                } else {
                    overlay.style.background = '#64748b'; // slate
                    overlay.innerHTML = `
                            <div class="flex flex-col items-center gap-1">
                                <svg aria-hidden="true" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                                <span class="text-[8px] font-black uppercase">Finished</span>
                            </div>
                        `;
                }
            } else {
                currentSwipingCard.classList.remove('swiping');
                currentSwipingCard.style.transform = '';
            }
        }, { passive: true });

        document.addEventListener('touchend', async e => {
            if (!currentSwipingCard) return;
            const diff = touchStartX - touchCurrentX;
            const card = currentSwipingCard;
            const bookId = card.dataset.bookId;

            card.classList.remove('swiping');
            card.style.transform = '';
            currentSwipingCard = null;

            if (diff > 80) { // Threshold met
                const statusData = getStatusData(bookId);
                const currentStatus = statusData.status;
                let nextStatus = null;

                if (currentStatus === 'want_to_read') nextStatus = 'reading';
                else if (currentStatus === 'reading') nextStatus = 'finished';

                if (nextStatus) {
                    window.showLoading();
                    try {
                        const updateData = {
                            status: nextStatus,
                            userId: currentUser.uid,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        };
                        if (nextStatus === 'finished') updateData.progress = 100;

                        await db.collection('books').doc(bookId)
                            .collection('readingStatus').doc(currentUser.uid).set(updateData, { merge: true });

                        showToast(`Marked as ${READING_STATUSES[nextStatus].label}`, 'success');
                        if (navigator.vibrate) navigator.vibrate([10, 30, 10]);
                    } catch (err) {
                        showToast('Error updating status: ' + err.message, 'error');
                    } finally {
                        window.hideLoading();
                    }
                }
            }
            touchStartX = 0;
            touchCurrentX = 0;
        }, { passive: true });

        })();
    </script>

    <style>
        /* Prevent layout shift during re-render */
        #main-content:empty {
            min-height: 50vh;
        }
    </style>

</body>

</html>
